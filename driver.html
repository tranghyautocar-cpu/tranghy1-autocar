<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đội Ngũ Tài Xế - TrangHy Autocar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; padding-top: 90px; }
        
        /* Đồng bộ hiệu ứng card với cars.html */
        .driver-card { 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            border-radius: 2.5rem; 
            background: white; 
            border: 1px solid #e2e8f0; 
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        
        .driver-card:hover { 
            transform: translateY(-12px); 
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.1); 
            border-color: #2563eb; 
        }

        .avatar-circle {
            width: 100px; height: 100px;
            background: #f1f5f9;
            border-radius: 50%; margin: 0 auto 1.5rem;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; border: 4px solid white;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .driver-card:hover .avatar-circle {
            transform: scale(1.1);
        }

        .btn-rent { 
            background: linear-gradient(135deg, #2563eb, #1e40af); 
            transition: all 0.3s ease; 
        }
        
        .btn-rent:hover { 
            opacity: 0.9; 
            transform: scale(1.02); 
        }

        .status-dot {
            height: 8px; width: 8px;
            background-color: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
    </style>
</head>
<body>
    <nav class="fixed top-0 w-full bg-white/90 backdrop-blur-md z-[1000] border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="font-black text-2xl italic">TRANGHY <span class="text-blue-600 not-italic text-xs tracking-[0.3em]">AUTOCAR</span></div>
            <div class="flex gap-8 font-bold text-xs uppercase tracking-widest text-slate-600">
                <a href="index.html" class="hover:text-blue-600 transition-colors">Trang chủ</a>
                <a href="cars.html" class="hover:text-blue-600 transition-colors">Đội xe</a>
                <a href="driver.html" class="text-blue-600 border-b-2 border-blue-600">Tài xế</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="mb-16">
            <span class="text-blue-600 font-extrabold uppercase tracking-widest text-[10px]">Professional Drivers</span>
            <h1 class="text-6xl font-black italic uppercase text-slate-900 tracking-tighter">Đội ngũ <span class="text-blue-600">Tài xế</span></h1>
            <p class="text-slate-500 font-medium mt-2">Đội ngũ tài xế tận tâm, kinh nghiệm, sẵn sàng đồng hành cùng bạn trên mọi nẻo đường.</p>
        </div>

        <div id="driver-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            </div>
    </main>

    <script>
        const driverData = [
            { "id": "TX01", "name": "Trần Đình Nam", "phone": "0905.123.456", "exp": "6 năm", "price": 500000, "avatar": "👨‍✈️" },
            { "id": "TX02", "name": "Lê Quốc Đức", "phone": "0912.987.654", "exp": "7 năm", "price": 500000, "avatar": "🧔" },
            { "id": "TX03", "name": "Phạm Minh Tùng", "phone": "0988.555.777", "exp": "8 năm", "price": 500000, "avatar": "👮‍♂️" },
            { "id": "TX04", "name": "Hoàng Thành Thắng", "phone": "0977.222.888", "exp": "9 năm", "price": 500000, "avatar": "👲" },
            { "id": "TX05", "name": "Vũ Hữu Tuấn", "phone": "0325.999.000", "exp": "5 năm", "price": 500000, "avatar": "🧑‍✈️" },
            { "id": "TX06", "name": "Đặng Văn Sơn", "phone": "0934.567.890", "exp": "6 năm", "price": 500000, "avatar": "👨‍✈️" },
            { "id": "TX07", "name": "Bùi Đình Hải", "phone": "0909.111.222", "exp": "7 năm", "price": 500000, "avatar": "🧔" },
            { "id": "TX08", "name": "Nguyễn Quốc Hùng", "phone": "0914.333.444", "exp": "8 năm", "price": 500000, "avatar": "👮‍♂️" },
            { "id": "TX09", "name": "Trần Minh Nam", "phone": "0966.777.888", "exp": "9 năm", "price": 500000, "avatar": "👲" },
            { "id": "TX10", "name": "Lê Thành Đức", "phone": "0388.999.111", "exp": "5 năm", "price": 500000, "avatar": "🧑‍✈️" },
            { "id": "TX11", "name": "Phạm Hữu Tùng", "phone": "0989.123.123", "exp": "6 năm", "price": 500000, "avatar": "👨‍✈️" },
            { "id": "TX12", "name": "Hoàng Văn Thắng", "phone": "0903.456.789", "exp": "7 năm", "price": 500000, "avatar": "🧔" },
            { "id": "TX13", "name": "Vũ Đình Tuấn", "phone": "0915.678.901", "exp": "8 năm", "price": 500000, "avatar": "👮‍♂️" }
        ];

        function renderDrivers() {
            const list = document.getElementById('driver-list');
            list.innerHTML = driverData.map(driver => `
                <div class="driver-card p-8">
                    <div class="absolute top-6 right-6">
                        <span class="bg-emerald-50 text-emerald-600 text-[9px] font-black px-3 py-1 rounded-full border border-emerald-100 flex items-center">
                            <span class="status-dot"></span> ĐANG TRỐNG
                        </span>
                    </div>

                    <div class="avatar-circle">
                        ${driver.avatar}
                    </div>

                    <div class="text-center flex-grow">
                        <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest">${driver.id}</span>
                        <h3 class="text-xl font-black text-slate-900 uppercase italic mb-1">${driver.name}</h3>
                        <p class="text-slate-400 font-bold text-[11px] uppercase mb-6">Kinh nghiệm: ${driver.exp}</p>
                        
                        <div class="flex justify-center gap-4 mb-8">
                            <div class="flex flex-col">
                                <span class="text-[9px] text-slate-400 font-bold uppercase">Chứng chỉ</span>
                                <span class="text-xs font-bold text-slate-700 italic">Hạng D, E</span>
                            </div>
                            <div class="w-[1px] h-8 bg-slate-100"></div>
                            <div class="flex flex-col">
                                <span class="text-[9px] text-slate-400 font-bold uppercase">Khu vực</span>
                                <span class="text-xs font-bold text-slate-700 italic">Toàn quốc</span>
                            </div>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-slate-50 flex items-center justify-between">
                        <div>
                            <p class="text-[9px] text-slate-400 font-bold uppercase">Phí dịch vụ</p>
                            <p class="text-xl font-black text-slate-900">${driver.price.toLocaleString('vi-VN')}đ<span class="text-[10px] font-medium text-slate-400">/ngày</span></p>
                        </div>
                        <button onclick="bookDriver('${driver.id}')" class="btn-rent text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200">
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function bookDriver(id) {
            // Chuyển sang trang booking-driver.html kèm ID tài xế
            window.location.href = `booking-driver.html?id=${id}`;
        }

        // Khởi tạo danh sách khi trang web tải xong
        window.onload = renderDrivers;
    </script>
</body>
</html>
