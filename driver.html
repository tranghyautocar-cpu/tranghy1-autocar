<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đội Ngũ Tài Xế - TrangHy Autocar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; padding-top: 100px; }
        .driver-card { 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            border-radius: 2.5rem; background: white; border: 1px solid #e2e8f0; 
            display: flex; flex-direction: column;
        }
        .driver-card:hover { 
            transform: translateY(-12px); 
            box-shadow: 0 30px 60px -12px rgba(37, 99, 235, 0.15); 
            border-color: #2563eb; 
        }
        .btn-action { transition: all 0.2s ease; }
        .btn-action:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <nav class="fixed top-0 w-full bg-white/90 backdrop-blur-md z-[1000] border-b border-slate-100 py-4">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <div class="font-black text-2xl italic">TRANGHY <span class="text-blue-600">AUTOCAR</span></div>
            <div class="flex gap-8 font-bold text-xs uppercase tracking-widest text-slate-600">
                <a href="index.html" class="hover:text-blue-600 transition-colors">Trang chủ</a>
                <a href="cars.html" class="hover:text-blue-600 transition-colors">Xe</a>
                <a href="driver.html" class="text-blue-600 border-b-2 border-blue-600">Tài xế</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="mb-16">
            <span class="text-blue-600 font-extrabold uppercase tracking-[0.2em] text-[10px] bg-blue-50 px-3 py-1 rounded-full">Đội ngũ chuyên gia</span>
            <h1 class="text-6xl font-black italic uppercase text-slate-900 tracking-tighter mt-4">P.S.P <span class="text-blue-600">Elite Team</span></h1>
            <p class="text-slate-500 font-medium mt-2 max-w-2xl">Lựa chọn người đồng hành tin cậy cho chuyến đi của bạn.</p>
        </div>

        <div id="driver-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </main>

    <script>
        const driverData = [
            { "id": "TX01", "name": "Trần Đình Nam", "exp": "6 năm", "price": 500000, "avatar": "👨‍✈️" },
            { "id": "TX02", "name": "Lê Quốc Đức", "exp": "7 năm", "price": 500000, "avatar": "🧔" },
            { "id": "TX03", "name": "Phạm Minh Tùng", "exp": "8 năm", "price": 500000, "avatar": "👮‍♂️" },
            { "id": "TX04", "name": "Hoàng Thành Thắng", "exp": "9 năm", "price": 500000, "avatar": "👲" },
            { "id": "TX05", "name": "Vũ Hữu Tuấn", "exp": "5 năm", "price": 500000, "avatar": "🧑‍✈️" },
            { "id": "TX06", "name": "Đặng Văn Sơn", "exp": "6 năm", "price": 500000, "avatar": "👨‍✈️" },
            { "id": "TX07", "name": "Bùi Đình Hải", "exp": "7 năm", "price": 500000, "avatar": "🧔" },
            { "id": "TX08", "name": "Nguyễn Quốc Hùng", "exp": "8 năm", "price": 500000, "avatar": "👮‍♂️" },
            { "id": "TX09", "name": "Trần Minh Nam", "exp": "9 năm", "price": 500000, "avatar": "👲" },
            { "id": "TX10", "name": "Lê Thành Đức", "exp": "5 năm", "price": 500000, "avatar": "🧑‍✈️" },
            { "id": "TX11", "name": "Phạm Hữu Tùng", "exp": "6 năm", "price": 500000, "avatar": "👨‍✈️" },
            { "id": "TX12", "name": "Hoàng Văn Thắng", "exp": "7 năm", "price": 500000, "avatar": "🧔" },
            { "id": "TX13", "name": "Vũ Đình Tuấn", "exp": "8 năm", "price": 500000, "avatar": "👮‍♂️" }
        ];

        function renderDrivers() {
            const list = document.getElementById('driver-list');
            list.innerHTML = driverData.map(driver => `
                <div class="driver-card p-8 text-center h-full">
                    <div class="text-7xl mb-6 transform transition-transform hover:scale-110 duration-300 drop-shadow-md">${driver.avatar}</div>
                    <div class="flex-grow">
                        <span class="text-[10px] font-black text-blue-600 uppercase bg-blue-50 px-3 py-1 rounded-lg mb-3 inline-block tracking-widest">ID: ${driver.id}</span>
                        <h3 class="text-2xl font-black uppercase italic text-slate-800 leading-tight mb-1">${driver.name}</h3>
                        <p class="text-slate-400 text-[10px] font-extrabold mb-6 tracking-widest uppercase italic">${driver.exp} kinh nghiệm</p>
                    </div>
                    <div class="pt-6 border-t border-slate-50 mt-auto">
                        <div class="flex justify-between items-end mb-6 text-left">
                            <div>
                                <p class="text-[9px] text-slate-400 font-bold uppercase">Giá thuê</p>
                                <p class="text-2xl font-black text-slate-900 leading-none">${driver.price.toLocaleString('vi-VN')}đ<span class="text-[10px] font-medium text-slate-400 italic">/ngày</span></p>
                            </div>
                            <i class="fa-solid fa-circle-check text-emerald-500 text-xl"></i>
                        </div>
                        <a href="booking-driver.html?id=${driver.id}&name=${encodeURIComponent(driver.name)}&price=${driver.price}&avatar=${encodeURIComponent(driver.avatar)}" 
                           class="btn-action block w-full bg-slate-900 text-white py-4 rounded-[20px] font-black text-xs uppercase tracking-widest hover:bg-blue-600 shadow-lg">
                            Liên hệ thuê ngay
                        </a>
                    </div>
                </div>
            `).join('');
        }
        window.onload = renderDrivers;
    </script>
</body>
</html>
