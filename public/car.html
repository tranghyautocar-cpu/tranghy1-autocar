    // --- 1. KHỞI TẠO DỮ LIỆU CHO ADMIN ---
    function initDataForAdmin() {
        // Chuyển đổi format sang format của admin.html (key: tranghy_cars)
        const formattedCars = carListData.map(car => ({
            name: car.name,
            type: car.category,
            price: car.price,
            img: car.image_url, // Đảm bảo đúng key 'img' mà admin.html đang dùng
            status: car.status === "Sẵn sàng" ? "ready" : "busy"
        }));

        localStorage.setItem('tranghy_cars', JSON.stringify(formattedCars));
        
        // Tạo tài khoản admin mẫu nếu chưa có
        if(!localStorage.getItem('tranghy_user')) {
            localStorage.setItem('tranghy_user', JSON.stringify({ name: 'Admin', role: 'ADMIN' }));
        }
    }

    // --- 2. HIỂN THỊ LÊN GIAO DIỆN ---
    function renderCarGrid() {
        const grid = document.getElementById('car-display-grid');
        grid.innerHTML = carListData.map(car => `
            <div class="car-card bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden transition-all duration-300">
                <div class="relative h-48 overflow-hidden bg-slate-200">
                    <img src="${car.image_url}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/600x400?text=No+Image'">
                    <div class="absolute top-4 left-4">
                        <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest shadow-sm ${car.status === 'Sẵn sàng' ? 'status-ready' : 'status-busy'}">
                            ${car.status}
                        </span>
                    </div>
                </div>
                <div class="p-6">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-lg font-extrabold text-slate-800 leading-tight">${car.name}</h3>
                    </div>
                    <div class="flex gap-2 mb-4">
                        <span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-1 rounded-md font-bold">${car.transmission}</span>
                        <span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-1 rounded-md font-bold">${car.fuel}</span>
                    </div>
                    <div class="flex justify-between items-center mt-6 pt-4 border-t border-slate-50">
                        <div>
                            <p class="text-[10px] text-slate-400 font-bold uppercase">Giá thuê ngày</p>
                            <p class="text-xl font-black text-blue-600">${car.price.toLocaleString('vi-VN')}đ</p>
                        </div>
                        <button class="bg-blue-50 text-blue-600 w-10 h-10 rounded-full flex items-center justify-center hover:bg-blue-600 hover:text-white transition-all">
                            <i class="fas fa-plus text-xs"></i>
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // Chạy khi trang load
    window.onload = () => {
        initDataForAdmin();
        renderCarGrid();
        console.log("✅ Hệ thống đã nạp 24 xe vào bộ nhớ quản trị.");
    };
