<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Xe - TrangHy Autocar Premium</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    
    <style>
        :root { 
            --primary: #2563eb; 
            --primary-dark: #1e40af;
            --accent: #f59e0b;
            --dark: #0f172a; 
            --bg: #f8fafc;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); padding-top: 80px; color: var(--dark); }
        .glass-nav { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
        .car-card { background: white; border-radius: 2rem; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(226, 232, 240, 0.5); position: relative; }
        .car-card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); border-color: var(--primary); }
        .status-badge { position: absolute; top: 1rem; right: 1rem; z-index: 10; padding: 0.5rem 1rem; border-radius: 1rem; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
        .btn-gradient { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); transition: all 0.3s ease; }
        .modal-overlay { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); }
        .active-modal { display: flex !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>

<body class="antialiased">
    <nav class="fixed top-0 left-0 w-full z-[1000] glass-nav">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-12 h-12 bg-slate-900 text-white rounded-2xl flex items-center justify-center font-black italic">T</div>
                <div class="flex flex-col">
                    <span class="font-black text-xl italic uppercase tracking-tighter text-slate-900">TRANGHY</span>
                    <span class="text-blue-600 font-bold text-[10px] tracking-[0.4em] uppercase">Autocar</span>
                </div>
            </a>
            <div class="hidden md:flex bg-slate-100/50 p-1.5 rounded-2xl border border-slate-200">
                <a href="index.html" class="px-6 py-2.5 rounded-xl text-slate-500 font-bold text-xs uppercase">Trang chủ</a>
                <a href="car.html" class="px-6 py-2.5 rounded-xl bg-white shadow-sm text-blue-600 font-bold text-xs uppercase">Đội xe</a>
            </div>
            <a href="tel:0905123456" class="btn-gradient text-white px-6 py-3 rounded-2xl font-bold text-xs uppercase shadow-lg shadow-blue-200">Hotline: 0905.123.456</a>
        </div>
    </nav>

    <main class="py-12">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex flex-col md:flex-row md:items-end justify-between mb-12 gap-6">
                <div>
                    <span class="text-blue-600 font-extrabold uppercase tracking-widest text-xs mb-2 block">Premium Fleet</span>
                    <h1 class="text-5xl md:text-7xl font-black text-slate-900 italic uppercase tracking-tighter">Đội Xe <span class="text-blue-600">Sẵn Có</span></h1>
                </div>
            </div>

            <div class="bg-white p-4 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col lg:flex-row gap-4 mb-12">
                <div id="filter-container" class="flex gap-2 overflow-x-auto no-scrollbar p-1">
                    <button onclick="filterCars('all')" class="filter-btn whitespace-nowrap px-8 py-3.5 rounded-2xl text-[11px] font-black uppercase bg-blue-600 text-white">Tất cả</button>
                    <button onclick="filterCars('4 chỗ')" class="filter-btn whitespace-nowrap px-8 py-3.5 rounded-2xl text-[11px] font-black uppercase text-slate-500 bg-slate-50">4 Chỗ</button>
                    <button onclick="filterCars('5 chỗ')" class="filter-btn whitespace-nowrap px-8 py-3.5 rounded-2xl text-[11px] font-black uppercase text-slate-500 bg-slate-50">5 Chỗ</button>
                    <button onclick="filterCars('7 chỗ')" class="filter-btn whitespace-nowrap px-8 py-3.5 rounded-2xl text-[11px] font-black uppercase text-slate-500 bg-slate-50">7 Chỗ</button>
                </div>
                <div class="lg:ml-auto relative flex-1 max-w-xl">
                    <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="carSearch" onkeyup="searchCars()" placeholder="Tìm kiếm mẫu xe..." class="w-full pl-14 pr-6 py-4 rounded-2xl bg-slate-50 outline-none font-bold text-sm ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-600 transition-all">
                </div>
            </div>

            <div id="car-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
        </div>
    </main>

    <div id="modal-car" class="modal-overlay p-4">
        <div class="bg-white w-full max-w-5xl max-h-[90vh] rounded-[3rem] overflow-hidden shadow-2xl flex flex-col md:flex-row relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 z-20 w-12 h-12 bg-white/80 shadow-lg rounded-full flex items-center justify-center hover:bg-red-500 hover:text-white transition-all">
                <i class="fas fa-times"></i>
            </button>
            <div class="md:w-5/12 bg-slate-50 p-8 flex flex-col justify-center">
                <img id="modal-car-img" src="" class="w-full h-auto object-contain drop-shadow-2xl mb-6">
                <div id="modal-features" class="grid grid-cols-1 gap-2"></div>
            </div>
            <div class="md:w-7/12 p-8 md:p-12 overflow-y-auto">
                <div class="mb-8">
                    <span id="modal-car-cat" class="text-blue-600 font-bold text-[10px] uppercase tracking-widest">Category</span>
                    <h2 id="modal-car-name" class="text-4xl font-black text-slate-900 italic uppercase mb-2">Tên Xe</h2>
                </div>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase text-slate-400">Ngày nhận</label>
                            <input type="text" id="pickup-date" class="w-full px-6 py-4 rounded-2xl bg-slate-50 ring-1 ring-slate-200 font-bold text-sm">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase text-slate-400">Ngày trả</label>
                            <input type="text" id="return-date" class="w-full px-6 py-4 rounded-2xl bg-slate-50 ring-1 ring-slate-200 font-bold text-sm">
                        </div>
                    </div>
                    <div class="bg-slate-900 p-8 rounded-[2.5rem] text-white mt-8 shadow-xl">
                        <div class="flex justify-between items-end">
                            <div>
                                <p class="text-blue-300 text-[10px] font-black uppercase mb-1">Ước tính (<span id="days-count">1</span> ngày)</p>
                                <span id="modal-total-price" class="text-4xl font-black italic">0 đ</span>
                            </div>
                            <button onclick="goToBookingPage()" class="bg-white text-slate-900 px-8 py-4 rounded-2xl font-black uppercase text-xs hover:bg-blue-600 hover:text-white transition-all">
                                Tiếp tục đặt xe
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

            { "id": 22, "name": "Huyndai i10", "category": "4 chỗ", "price": 500000, "image_url": "images/huyn_i10.jpg", "transmission": "Số sàn", "engine": "1.2L Kappa", "fuel": "Xăng", "status": "Sẵn sàng", "features": ["Dễ đỗ xe", "Tiết kiệm xăng", "Bản đồ dẫn đường tích hợp"] },
            { "id": 23, "name": "Mercedes E300", "category": "5 chỗ", "price": 4500000, "image_url": "images/e300.jpg", "transmission": "Tự động", "engine": "2.0L Turbo", "fuel": "Xăng", "status": "Sẵn sàng", "features": ["Gói AMG Line", "Cửa hít", "Loa Burmester"] },
            { "id": 24, "name": "Ford Ranger", "category": "5 chỗ", "price": 1400000, "image_url": "images/foer_ranger.jpg", "transmission": "Tự động", "engine": "2.0L Single Turbo", "fuel": "Dầu", "status": "Sẵn sàng", "features": ["Khả năng lội nước 800mm", "Màn hình dọc 10 inch", "Thùng xe rộng"] }
        ];

        let selectedCar = null;
        let days = 1;

        function formatVND(amount) {
            return new Intl.NumberFormat('vi-VN').format(amount) + " đ";
        }

        function renderCars(data) {
            const list = document.getElementById('car-list');
            list.innerHTML = data.map(car => {
                const isBusy = car.status === 'Đang thuê';
                return `
                <div class="car-card flex flex-col h-full group">
                    <span class="status-badge ${isBusy ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">
                        ● ${car.status}
                    </span>
                    <div class="w-full h-48 overflow-hidden bg-slate-100 rounded-t-[2rem]">
                        <img src="${car.image_url}" class="w-full h-full object-cover group-hover:scale-110 transition-duration-500">
                    </div>
                    <div class="p-6 flex flex-col flex-grow">
                        <span class="text-[9px] font-black text-blue-600 uppercase mb-2">${car.category} | ${car.transmission}</span>
                        <h3 class="text-lg font-black text-slate-900 uppercase italic mb-4">${car.name}</h3>
                        <div class="mt-auto pt-5 border-t border-slate-100 flex items-center justify-between">
                            <div>
                                <p class="text-xl font-black text-slate-900">${formatVND(car.price)}</p>
                            </div>
                            <button onclick="${isBusy ? '' : `openBooking(${car.id})`}" 
                                class="w-12 h-12 rounded-2xl flex items-center justify-center ${isBusy ? 'bg-slate-200 text-slate-400' : 'btn-gradient text-white shadow-lg'}">
                                <i class="fas ${isBusy ? 'fa-lock' : 'fa-arrow-right'}"></i>
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function openBooking(id) {
            selectedCar = carData.find(c => c.id == id);
            document.getElementById('modal-car-name').innerText = selectedCar.name;
            document.getElementById('modal-car-img').src = selectedCar.image_url;
            document.getElementById('modal-car-cat').innerText = `${selectedCar.category} - ${selectedCar.engine}`;
            
            document.getElementById('modal-features').innerHTML = selectedCar.features.map(f => `
                <div class="bg-white p-3 rounded-xl text-[10px] font-bold text-slate-600 border border-slate-200 flex items-center">
                    <i class="fas fa-check-circle text-blue-600 mr-2"></i> ${f}
                </div>
            `).join('');

            document.getElementById('modal-car').classList.add('active-modal');
            
            const fp = { minDate: "today", dateFormat: "d/m/Y", onChange: calcDays };
            flatpickr("#pickup-date", fp);
            flatpickr("#return-date", fp);
            calcDays();
        }

        function calcDays() {
            const p = document.getElementById('pickup-date')._flatpickr?.selectedDates[0];
            const r = document.getElementById('return-date')._flatpickr?.selectedDates[0];
            if(p && r) {
                const diff = Math.max(1, Math.ceil((r - p) / (1000 * 60 * 60 * 24)));
                days = diff;
                document.getElementById('days-count').innerText = days;
                document.getElementById('modal-total-price').innerText = formatVND(selectedCar.price * days);
            } else {
                document.getElementById('modal-total-price').innerText = formatVND(selectedCar.price);
            }
        }

        function goToBookingPage() {
            if (!selectedCar) return;
            const p = document.getElementById('pickup-date').value;
            const r = document.getElementById('return-date').value;
            // Link sang booking-car.html kèm ID và ngày tháng
            window.location.href = `booking-car.html?id=${selectedCar.id}&pickup=${encodeURIComponent(p)}&return=${encodeURIComponent(r)}`;
        }

        function filterCars(cat) {
            const filtered = cat === 'all' ? carData : carData.filter(c => c.category === cat);
            renderCars(filtered);
        }

        function searchCars() {
            const q = document.getElementById('carSearch').value.toLowerCase();
            renderCars(carData.filter(c => c.name.toLowerCase().includes(q)));
        }

        function closeModal() { document.getElementById('modal-car').classList.remove('active-modal'); }

        window.onload = () => renderCars(carData);
    </script>
</body>
</html>
