<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Xe - TrangHy Autocar</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    
    <style>
        :root { 
            --primary: #2563eb; 
            --primary-dark: #1a4bd3;
            --dark: #0f172a; 
            --bg: #f8fafc;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            padding-top: 100px;
        }

        nav {
            position: fixed !important;
            top: 0; left: 0; width: 100%; z-index: 1000;
            background: rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .car-card { 
            background: white;
            border-radius: 2.5rem;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(226, 232, 240, 0.8);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .car-card:hover { 
            transform: translateY(-12px);
            box-shadow: 0 30px 60px rgba(15, 23, 42, 0.1);
            border-color: var(--primary);
        }

        .car-img-container {
            width: 100%;
            height: 200px;
            overflow: hidden;
            background: #f1f5f9;
        }

        .car-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .car-card:hover img {
            transform: scale(1.1);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            align-items: center;
            justify-content: center;
        }

        .active-modal { display: flex !important; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>

<body class="antialiased">

    <nav class="p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center px-4">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-slate-900 text-white rounded-full flex items-center justify-center font-black italic">T</div>
                <div class="flex flex-col leading-none">
                    <span class="font-black text-lg italic uppercase text-slate-900">TRANGHY</span>
                    <span class="text-blue-600 font-bold text-[8px] tracking-[0.3em] uppercase">Autocar</span>
                </div>
            </a>
            <div class="hidden md:flex bg-slate-100 rounded-full p-1">
                <a href="index.html" class="px-6 py-2 rounded-full text-slate-500 font-bold text-xs uppercase">Trang chủ</a>
                <a href="car.html" class="px-6 py-2 rounded-full bg-white shadow text-slate-900 font-bold text-xs uppercase">Xe</a>
                <a href="driver.html" class="px-6 py-2 rounded-full text-slate-500 font-bold text-xs uppercase">Tài xế</a>
            </div>
            <a href="tel:0905123456" class="bg-slate-900 text-white px-5 py-2.5 rounded-full font-bold text-xs uppercase">Hotline</a>
        </div>
    </nav>

    <main class="py-10">
        <div class="max-w-7xl mx-auto px-4">
            <div class="mb-12">
                <h1 class="text-4xl md:text-6xl font-black text-slate-900 italic uppercase tracking-tighter mb-4">Đội Xe Sẵn Có</h1>
                <p class="text-slate-500 font-medium border-l-4 border-blue-600 pl-4">Khám phá dàn xe đời mới 2024-2025, đa dạng phân khúc.</p>
            </div>

            <div class="flex flex-col lg:flex-row justify-between items-center gap-6 mb-16">
                <div id="filter-container" class="flex p-2 bg-slate-100 rounded-[2rem] gap-2 overflow-x-auto no-scrollbar w-full lg:w-auto">
                    <button onclick="filterCars('all')" class="filter-btn px-8 py-3 rounded-full text-[11px] font-black uppercase tracking-widest transition-all bg-white shadow text-blue-600">Tất cả</button>
                    <button onclick="filterCars('4 chỗ')" class="filter-btn px-8 py-3 rounded-full text-[11px] font-black uppercase tracking-widest text-slate-500">4 Chỗ</button>
                    <button onclick="filterCars('5 chỗ')" class="filter-btn px-8 py-3 rounded-full text-[11px] font-black uppercase tracking-widest text-slate-500">5 Chỗ</button>
                    <button onclick="filterCars('7 chỗ')" class="filter-btn px-8 py-3 rounded-full text-[11px] font-black uppercase tracking-widest text-slate-500">7 Chỗ</button>
                </div>
                
                <div class="relative w-full lg:w-[400px]">
                    <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="carSearch" onkeyup="searchCars()" placeholder="Tìm mẫu xe (Vd: Camry, VF8...)" class="w-full pl-14 pr-8 py-4 rounded-full bg-slate-50 border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-600 outline-none font-bold text-sm shadow-inner transition-all">
                </div>
            </div>

            <div id="car-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                </div>
        </div>
    </main>

    <div id="modal-car" class="modal-overlay">
        <div class="bg-white w-full max-w-4xl max-h-[95vh] rounded-[3rem] overflow-hidden shadow-2xl flex flex-col md:flex-row relative mx-4">
            <button onclick="closeModal()" class="absolute top-6 right-6 z-10 w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-900 hover:bg-red-500 hover:text-white transition-all">
                <i class="fas fa-times"></i>
            </button>
            
            <div class="md:w-1/2 bg-slate-50 p-8 flex flex-col items-center justify-center">
                <img id="modal-car-img" src="" class="w-full h-auto object-contain mb-6" alt="Xe">
                <div id="modal-features" class="grid grid-cols-2 gap-2 w-full">
                    </div>
            </div>

            <div class="md:w-1/2 p-8 md:p-12 overflow-y-auto">
                <h2 id="modal-car-name" class="text-3xl font-black text-slate-900 italic uppercase tracking-tighter mb-6">Tên Xe</h2>
                
                <div class="space-y-4">
                    <input type="text" id="cust-name" placeholder="Họ và tên khách hàng" class="w-full px-6 py-4 rounded-2xl bg-slate-50 border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-600 outline-none font-bold">
                    <input type="tel" id="cust-phone" placeholder="Số điện thoại" class="w-full px-6 py-4 rounded-2xl bg-slate-50 border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-600 outline-none font-bold">
                    <input type="text" id="cust-cccd" placeholder="Số CCCD" class="w-full px-6 py-4 rounded-2xl bg-slate-50 border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-600 outline-none font-bold">
                    
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="pickup-date" placeholder="Ngày nhận" class="px-6 py-4 rounded-2xl bg-slate-50 border-none ring-1 ring-slate-200 font-bold text-xs">
                        <input type="text" id="return-date" placeholder="Ngày trả" class="px-6 py-4 rounded-2xl bg-slate-50 border-none ring-1 ring-slate-200 font-bold text-xs">
                    </div>

                    <div class="bg-blue-50 p-6 rounded-[2rem] border border-blue-100 mt-6">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs font-bold text-blue-600 uppercase italic">Thanh toán (<span id="days-count">1</span> ngày):</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span id="modal-total-price" class="text-3xl font-black text-slate-900 italic">0 đ</span>
                        </div>
                    </div>

                    <button onclick="submitBooking()" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-blue-600 transition-all shadow-xl">
                        Xác nhận đặt ngay
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

        let selectedCar = null;
        let days = 1;

        function formatVND(amount) {
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
        }

        function renderCars(data) {
            const list = document.getElementById('car-list');
            list.innerHTML = data.map(car => `
                <div class="car-card">
                    <div class="car-img-container">
                        <img src="${car.image_url}" alt="${car.name}" onerror="this.src='https://via.placeholder.com/400x250?text=TrangHy+Autocar'">
                    </div>
                    <div class="p-6 flex flex-col flex-grow">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full uppercase tracking-widest">${car.category}</span>
                            <span class="text-[10px] font-bold text-slate-400 uppercase">${car.transmission}</span>
                        </div>
                        <h3 class="text-xl font-black text-slate-900 uppercase italic mb-4">${car.name}</h3>
                        <div class="space-y-2 mb-6 flex-grow">
                            <div class="flex items-center text-xs font-medium text-slate-500">
                                <i class="fas fa-microchip w-5 text-blue-600"></i> ${car.engine}
                            </div>
                            <div class="flex items-center text-xs font-medium text-slate-500">
                                <i class="fas fa-gas-pump w-5 text-blue-600"></i> ${car.fuel}
                            </div>
                        </div>
                        <div class="pt-4 border-t border-slate-100 flex items-center justify-between">
                            <div>
                                <p class="text-[10px] font-black text-slate-400 uppercase">Giá thuê ngày</p>
                                <p class="text-lg font-black text-slate-900 italic">${formatVND(car.price)}</p>
                            </div>
                            <button onclick="openBooking('${car.id}')" class="bg-slate-900 text-white w-12 h-12 rounded-2xl flex items-center justify-center hover:bg-blue-600 transition-all shadow-lg">
                                <i class="fas fa-arrow-right"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterCars(cat) {
            // Update UI buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-white', 'shadow', 'text-blue-600');
                btn.classList.add('text-slate-500');
            });
            event.target.classList.add('bg-white', 'shadow', 'text-blue-600');
            
            const filtered = cat === 'all' ? carData : carData.filter(c => c.category === cat);
            renderCars(filtered);
        }

        function searchCars() {
            const query = document.getElementById('carSearch').value.toLowerCase();
            const filtered = carData.filter(c => c.name.toLowerCase().includes(query));
            renderCars(filtered);
        }

        function openBooking(id) {
            selectedCar = carData.find(c => c.id == id);
            document.getElementById('modal-car-name').innerText = selectedCar.name;
            document.getElementById('modal-car-img').src = selectedCar.image_url;
            document.getElementById('modal-total-price').innerText = formatVND(selectedCar.price);
            
            // Render features
            const featuresBox = document.getElementById('modal-features');
            featuresBox.innerHTML = selectedCar.features.map(f => `
                <div class="bg-white p-2 rounded-xl text-[10px] font-bold text-slate-600 border border-slate-100">
                    <i class="fas fa-check text-blue-600 mr-1"></i> ${f}
                </div>
            `).join('');

            document.getElementById('modal-car').classList.add('active-modal');
            
            // Init date pickers
            flatpickr("#pickup-date", { minDate: "today", onChange: calcDays });
            flatpickr("#return-date", { minDate: "today", onChange: calcDays });
        }

        function calcDays() {
            const p = document.getElementById('pickup-date')._flatpickr.selectedDates[0];
            const r = document.getElementById('return-date')._flatpickr.selectedDates[0];
            if(p && r && r >= p) {
                const diff = Math.ceil((r - p) / (1000 * 60 * 60 * 24)) + 1;
                days = diff;
                document.getElementById('days-count').innerText = days;
                document.getElementById('modal-total-price').innerText = formatVND(selectedCar.price * days);
            }
        }

        function closeModal() {
            document.getElementById('modal-car').classList.remove('active-modal');
        }

        function submitBooking() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            if(!name || !phone) return alert("Vui lòng nhập đủ thông tin!");
            
            alert(`Cảm ơn ${name}! Yêu cầu đặt xe ${selectedCar.name} đã được gửi. Chúng tôi sẽ gọi cho bạn qua số ${phone} ngay!`);
            closeModal();
        }

        // Khởi tạo trang
        window.onload = () => renderCars(carData);
    </script>
</body>
</html>
