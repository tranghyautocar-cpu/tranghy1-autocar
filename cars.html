<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết & Thanh Toán - TrangHy Luxury</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/material_blue.css">

    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --primary-gradient: linear-gradient(135deg, #2563eb, #7c3aed);
            --bg-body: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --accent: #f59e0b;
            --success: #22c55e;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0; padding: 20px;
            background-image: radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.05) 0px, transparent 50%), radial-gradient(at 100% 0%, rgba(124, 58, 237, 0.05) 0px, transparent 50%);
        }

        .back-btn {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: var(--card-bg); border: 1px solid var(--border);
            color: var(--text-main); padding: 10px 20px; border-radius: 12px;
            text-decoration: none; font-weight: 700; font-size: 0.9rem;
            transition: 0.3s; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .back-btn:hover { background: var(--primary); color: white; transform: translateX(-5px); }

        .booking-container {
            max-width: 1100px; width: 100%; background: var(--card-bg);
            border-radius: 32px; overflow: hidden; margin: 60px auto;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            border: 1px solid white;
            display: none; /* Ẩn đi cho đến khi load xong dữ liệu */
        }

        /* Hero Section */
        .car-hero-section { position: relative; height: 450px; overflow: hidden; background: #e2e8f0; }
        .car-hero-section img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .car-info-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 80px 40px 40px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: white;
        }
        .car-badge {
            position: absolute; top: 30px; left: 40px;
            background: var(--primary-gradient); color: white;
            padding: 8px 20px; border-radius: 50px; font-size: 0.8rem; font-weight: 800;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4);
            z-index: 10;
        }

        /* Specs Grid */
        .specs-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 20px; padding: 30px 40px; background: #f1f5f9;
        }
        .spec-item {
            background: white; padding: 15px; border-radius: 16px;
            text-align: center; border: 1px solid var(--border); transition: 0.3s;
        }
        .spec-item i { color: var(--primary); font-size: 1.2rem; margin-bottom: 8px; display: block; }
        .spec-item span { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .spec-item b { display: block; font-size: 1rem; color: var(--text-main); margin-top: 4px; }

        /* Form Layout */
        .booking-form-content { padding: 40px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; }
        h3 { 
            font-size: 1.25rem; font-weight: 800; color: var(--text-main);
            margin-bottom: 25px; display: flex; align-items: center; gap: 12px;
            border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;
        }
        h3 i { color: var(--primary); }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px; }
        input, select {
            width: 100%; padding: 14px 18px; background: #f8fafc;
            border: 2px solid var(--border); border-radius: 14px; color: var(--text-main);
            font-family: inherit; font-size: 1rem; outline: none; transition: 0.3s;
            box-sizing: border-box;
        }
        input:focus, select:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .driver-card {
            display: flex; justify-content: space-between; align-items: center;
            background: #eff6ff; padding: 20px; border-radius: 18px;
            border: 2px solid #dbeafe; margin-top: 15px;
        }

        /* Summary Section */
        .summary-box {
            margin-top: 40px; padding: 40px; border-top: 2px solid var(--border);
            text-align: center; background: linear-gradient(to bottom, white, #f1f5f9);
        }
        .total-price-tag { font-size: 3rem; font-weight: 900; color: var(--primary); margin: 10px 0; letter-spacing: -1px; }

        .btn-confirm {
            width: 100%; max-width: 400px; padding: 20px; 
            background: var(--primary-gradient); color: white;
            border: none; border-radius: 18px; font-weight: 800; font-size: 1.2rem;
            cursor: pointer; transition: 0.4s; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4);
        }
        .btn-confirm:hover { transform: translateY(-3px); box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.5); }

        /* Modal Payment */
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px); z-index: 1000; justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content {
            background: white; padding: 40px; border-radius: 32px;
            width: 100%; max-width: 450px; text-align: center; position: relative;
        }

        @media (max-width: 850px) {
            .form-grid { grid-template-columns: 1fr; gap: 30px; }
            .specs-grid { grid-template-columns: repeat(2, 1fr); }
            .car-hero-section { height: 300px; }
        }
    </style>
</head>
<body>

<a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> QUAY LẠI</a>

<div id="loading-state" style="text-align: center; margin-top: 100px; color: var(--text-muted);">
    <i class="fa-solid fa-spinner fa-spin fa-3x"></i>
    <p>Đang tải dữ liệu xe...</p>
</div>

<div class="booking-container" id="main-content">
    <div class="car-hero-section">
        <div class="car-badge" id="car-category">LUXURY</div>
        <img id="car-img" src="" alt="Car Image">
        <div class="car-info-overlay">
            <h1 id="car-name" style="margin:0; font-size: 2.5rem; font-weight: 800;">Tên Xe</h1>
            <p id="car-price-unit" style="color: #cbd5e1; font-size: 1.1rem; margin-top: 8px;">-- / ngày</p>
        </div>
    </div>

    <div class="specs-grid">
        <div class="spec-item"><i class="fa-solid fa-gas-pump"></i><span>Nhiên liệu</span><b id="spec-fuel">-</b></div>
        <div class="spec-item"><i class="fa-solid fa-gear"></i><span>Hộp số</span><b id="spec-transmission">-</b></div>
        <div class="spec-item"><i class="fa-solid fa-bolt"></i><span>Động cơ</span><b id="spec-engine">-</b></div>
        <div class="spec-item"><i class="fa-solid fa-chair"></i><span>Chỗ ngồi</span><b id="spec-seats">-</b></div>
    </div>

    <form id="rental-form" class="booking-form-content">
        <div class="form-grid">
            <div class="col-left">
                <h3><i class="fa-solid fa-calendar-days"></i> 1. LỊCH TRÌNH</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-group"><label>Ngày nhận xe</label><input type="text" id="pickup-date" required></div>
                    <div class="input-group"><label>Ngày trả xe</label><input type="text" id="return-date" required></div>
                </div>
                <div class="input-group">
                    <label>Hình thức nhận xe</label>
                    <select id="location-select">
                        <option value="Tại Gara">Nhận xe tại Gara (Miễn phí)</option>
                        <option value="Tại Nhà">Giao tận nơi (Phí thỏa thuận)</option>
                    </select>
                    <input type="text" id="cust-location" placeholder="Địa chỉ giao xe cụ thể..." style="margin-top:15px; display:none;">
                </div>
                <div class="driver-card">
                    <div><b>Thuê tài xế riêng</b><br><small>+500.000đ/ngày</small></div>
                    <input type="checkbox" id="with-driver" style="width:24px; height:24px;">
                </div>
            </div>

            <div class="col-right">
                <h3><i class="fa-solid fa-id-card-clip"></i> 2. KHÁCH HÀNG</h3>
                <div class="input-group"><label>Họ và tên</label><input type="text" id="cust-fullname" placeholder="NGUYỄN VĂN A" required></div>
                <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 15px;">
                    <div class="input-group"><label>Số điện thoại Zalo</label><input type="tel" id="cust-phone" maxlength="10" required></div>
                    <div class="input-group"><label>Ngày sinh</label><input type="text" id="cust-dob" required></div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 2.5fr; gap: 15px;">
                    <div class="input-group">
                        <label>Hạng GPLX</label>
                        <select id="cust-license-type"><option>B1</option><option selected>B2</option><option>C</option></select>
                    </div>
                    <div class="input-group"><label>Số GPLX</label><input type="text" id="cust-license-no" maxlength="12" required></div>
                </div>
                <div class="input-group"><label>Số CCCD</label><input type="text" id="cust-cccd" maxlength="12" required></div>
            </div>
        </div>

        <div class="summary-box">
            <p>Tổng tiền thuê cho <span id="calc-days-text">1</span> ngày</p>
            <div class="total-price-tag" id="total-price">0 VNĐ</div>
            <button type="submit" class="btn-confirm" id="submit-btn">ĐẶT CỌC NGAY</button>
        </div>
    </form>
</div>

<div id="payment-modal" class="modal">
    <div class="modal-content">
        <h2 style="margin-bottom:20px;">XÁC NHẬN ĐẶT CỌC</h2>
        <img id="qr-code" src="" style="width:250px; height:250px; margin-bottom:20px; border-radius:15px; border:1px solid #eee;">
        <div style="text-align:left; background:#f8fafc; padding:20px; border-radius:15px; margin-bottom:20px; font-size:0.9rem;">
            <p>Xe: <b id="m-car">-</b></p>
            <p>Thành tiền: <b id="m-total" style="color:var(--primary);">-</b></p>
            <p>Nội dung: <b id="m-memo" style="color:var(--accent);">-</b></p>
        </div>
        <button class="btn-confirm" onclick="carApp.finish()">TÔI ĐÃ CHUYỂN KHOẢN</button>
    </div>
</div>

<script src="cars.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://npmcdn.com/flatpickr/dist/l10n/vn.js"></script>

<script>
    const carApp = {
        state: { car: null, days: 1, total: 0 },
        CONFIG: {
            BANK_ID: "MB",
            ACC_NO: "0353979614",
            ACC_NAME: "BUI VAN TRANG",
            DRIVER_FEE: 500000,
            ZALO: "https://zalo.me/0353979614",
            SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbzDi9Cjw1E6cINUdmTn15HpQ3Cebb49fp9PKjJKzgGKzfXs3DQ5dVVwPjLF2YZ5XYlp/exec'
        },

        init() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            // KIỂM TRA DỮ LIỆU XE TỪ FILE CARS.JS
            // Nếu file cars.js của bạn đặt tên biến khác CARS_DATA, hãy đổi tên ở đây
            const sourceData = (typeof CARS_DATA !== 'undefined') ? CARS_DATA : null;

            if (id && sourceData) {
                const car = sourceData.find(c => String(c.id) === String(id));
                if (car) {
                    this.state.car = car;
                    this.renderUI(car);
                    this.setupPickers();
                    this.bindEvents();
                    
                    document.getElementById('loading-state').style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';
                } else {
                    this.error("Không tìm thấy xe này trong danh sách!");
                }
            } else {
                this.error("Thiếu dữ liệu xe hoặc ID không hợp lệ!");
            }
        },

        renderUI(car) {
            document.getElementById('car-name').innerText = car.name;
            document.getElementById('car-img').src = car.image_url || car.image;
            document.getElementById('car-price-unit').innerText = `${this.fmt(car.price)} / ngày`;
            document.getElementById('car-category').innerText = (car.category || "LUXURY").toUpperCase();
            document.getElementById('spec-fuel').innerText = car.fuel || "Xăng";
            document.getElementById('spec-transmission').innerText = car.transmission || "Tự động";
            document.getElementById('spec-engine').innerText = car.engine || "2.0L";
            document.getElementById('spec-seats').innerText = car.seats || "5 Chỗ";
            this.calculateTotal();
        },

        setupPickers() {
            const cfg = { dateFormat: "d/m/Y", locale: "vn", disableMobile: true };
            const p = flatpickr("#pickup-date", { ...cfg, minDate: "today", onChange: (d) => { r.set('minDate', d[0]); this.calculateTotal(); } });
            const r = flatpickr("#return-date", { ...cfg, minDate: "today", onChange: () => this.calculateTotal() });
            flatpickr("#cust-dob", { ...cfg, maxDate: "today", defaultDate: "01/01/1995", monthSelectorType: "dropdown" });
        },

        bindEvents() {
            document.getElementById('with-driver').onchange = () => this.calculateTotal();
            document.getElementById('location-select').onchange = (e) => {
                const isHome = e.target.value === 'Tại Nhà';
                document.getElementById('cust-location').style.display = isHome ? 'block' : 'none';
                document.getElementById('cust-location').required = isHome;
            };
            ['cust-phone', 'cust-cccd', 'cust-license-no'].forEach(id => {
                document.getElementById(id).oninput = (e) => e.target.value = e.target.value.replace(/[^0-9]/g, '');
            });
            document.getElementById('cust-fullname').oninput = (e) => e.target.value = e.target.value.toUpperCase();
            document.getElementById('rental-form').onsubmit = (e) => { e.preventDefault(); this.handleBooking(); };
        },

        calculateTotal() {
            const s = document.getElementById('pickup-date')._flatpickr?.selectedDates[0];
            const e = document.getElementById('return-date')._flatpickr?.selectedDates[0];
            if (s && e && this.state.car) {
                const days = Math.ceil(Math.abs(e - s) / (86400000)) || 1;
                this.state.days = days;
                let total = days * this.state.car.price;
                if (document.getElementById('with-driver').checked) total += (days * this.CONFIG.DRIVER_FEE);
                this.state.total = total;
                document.getElementById('total-price').innerText = this.fmt(total);
                document.getElementById('calc-days-text').innerText = days;
            }
        },

        fmt(n) { return new Intl.NumberFormat('vi-VN').format(n) + " VNĐ"; },

        error(msg) {
            alert(msg);
            window.location.href = 'index.html';
        },

        async handleBooking() {
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerHTML = 'ĐANG XỬ LÝ...';
            
            const payload = {
                Ten: document.getElementById('cust-fullname').value,
                SDT: document.getElementById('cust-phone').value,
                Xe: this.state.car.name,
                NgayThue: document.getElementById('pickup-date').value,
                NgayTra: document.getElementById('return-date').value,
                TongTien: this.fmt(this.state.total)
            };

            fetch(this.CONFIG.SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });

            const memo = `DAT XE ${this.state.car.id} ${payload.SDT}`;
            document.getElementById('m-car').innerText = payload.Xe;
            document.getElementById('m-total').innerText = payload.TongTien;
            document.getElementById('m-memo').innerText = memo;
            document.getElementById('qr-code').src = `https://img.vietqr.io/image/${this.CONFIG.BANK_ID}-${this.CONFIG.ACC_NO}-compact2.png?amount=${this.state.total}&addInfo=${encodeURIComponent(memo)}&accountName=${encodeURIComponent(this.CONFIG.ACC_NAME)}`;
            
            document.getElementById('payment-modal').style.display = 'flex';
            btn.disabled = false; btn.innerText = "ĐẶT CỌC NGAY";
        },

        finish() { window.location.href = this.CONFIG.ZALO; }
    };

    document.addEventListener('DOMContentLoaded', () => carApp.init());
</script>
</body>
</html>
