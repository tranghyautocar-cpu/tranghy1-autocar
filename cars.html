<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đội Xe Premium - TrangHy Autocar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; padding-top: 90px; }
        .car-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 2.5rem; background: white; border: 1px solid #e2e8f0; }
        .car-card:hover { transform: translateY(-12px); box-shadow: 0 30px 60px -12px rgba(0,0,0,0.1); border-color: #2563eb; }
        .btn-rent { background: linear-gradient(135deg, #2563eb, #1e40af); transition: all 0.3s ease; }
        .btn-rent:hover { opacity: 0.9; transform: scale(1.02); }
    </style>
</head>
<body>
    <nav class="fixed top-0 w-full bg-white/90 backdrop-blur-md z-[1000] border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="font-black text-2xl italic">TRANGHY <span class="text-blue-600 not-italic text-xs tracking-[0.3em]">AUTOCAR</span></div>
            <div class="flex gap-8 font-bold text-xs uppercase tracking-widest text-slate-600">
                <a href="index.html" class="hover:text-blue-600">Trang chủ</a>
                <a href="cars.html" class="text-blue-600 border-b-2 border-blue-600">Đội xe</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="mb-16">
            <span class="text-blue-600 font-extrabold uppercase tracking-widest text-[10px]">Our Collection</span>
            <h1 class="text-6xl font-black italic uppercase text-slate-900 tracking-tighter">Khám phá <span class="text-blue-600">Đội xe</span></h1>
        </div>

        <div id="car-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            </div>
    </main>

    <script>
        const carData = [
            { "id": 1, "name": "Toyota Camry 2024", "category": "5 chỗ", "price": 1200000, "image_url": "images/toyota_2024.jpg", "transmission": "Tự động" },
            { "id": 2, "name": "VinFast VF8", "category": "5 chỗ", "price": 1500000, "image_url": "images/vinvf8.jpg", "transmission": "Tự động" },
            { "id": 3, "name": "Hyundai SantaFe", "category": "7 chỗ", "price": 1800000, "image_url": "images/santafe.jpg", "transmission": "Tự động" },
            { "id": 4, "name": "Kia Morning", "category": "4 chỗ", "price": 600000, "image_url": "images/kiamoning.jpg", "transmission": "Số sàn" },
            { "id": 5, "name": "Mazda 3", "category": "5 chỗ", "price": 950000, "image_url": "images/mazda3.jpg", "transmission": "Tự động" },
            { "id": 6, "name": "Mitsubishi Xpander", "category": "7 chỗ", "price": 1000000, "image_url": "images/xpander.jpg", "transmission": "Tự động" },
            { "id": 7, "name": "Mercedes C200", "category": "5 chỗ", "price": 2800000, "image_url": "images/e200.jpg", "transmission": "Tự động" },
            { "id": 8, "name": "Ford Everest", "category": "7 chỗ", "price": 2200000, "image_url": "images/foreverret.jpg", "transmission": "Tự động" },
            { "id": 9, "name": "Honda City", "category": "5 chỗ", "price": 800000, "image_url": "images/honda_citi.jpg", "transmission": "Tự động" },
            { "id": 10, "name": "Kia Carnival", "category": "7 chỗ", "price": 3500000, "image_url": "images/kia_carnival.jpg", "transmission": "Tự động" },
            { "id": 11, "name": "Hyundai Accent", "category": "5 chỗ", "price": 750000, "image_url": "images/huyndai_acen.jpg", "transmission": "Số sàn" },
            { "id": 12, "name": "BMW 320i", "category": "5 chỗ", "price": 3200000, "image_url": "images/bmw_320i.jpg", "transmission": "Tự động" },
            { "id": 13, "name": "Toyota Fortuner", "category": "7 chỗ", "price": 1700000, "image_url": "images/toyota_fortune.jpg", "transmission": "Tự động" },
            { "id": 14, "name": "VinFast VF9", "category": "7 chỗ", "price": 2500000, "image_url": "images/vin_vf9.jpg", "transmission": "Tự động" },
            { "id": 15, "name": "Kia Soluto", "category": "4 chỗ", "price": 550000, "image_url": "images/kia_soluto.jpg", "transmission": "Số sàn" },
            { "id": 16, "name": "Toyota Vios", "category": "5 chỗ", "price": 700000, "image_url": "images/vios_2025.jpg", "transmission": "Số sàn" },
            { "id": 17, "name": "Mazda CX-5", "category": "5 chỗ", "price": 1300000, "image_url": "images/cx5.jpg", "transmission": "Tự động" },
            { "id": 18, "name": "Hyundai Tucson", "category": "5 chỗ", "price": 1250000, "image_url": "images/tucson.jpg", "transmission": "Tự động" },
            { "id": 19, "name": "Toyota Innova", "category": "7 chỗ", "price": 1100000, "image_url": "images/toyota_2024.jpg", "transmission": "Tự động" },
            { "id": 20, "name": "Kia K3", "category": "5 chỗ", "price": 900000, "image_url": "images/kia_k3.jpg", "transmission": "Tự động" },
            { "id": 21, "name": "Honda CR-V", "category": "7 chỗ", "price": 1600000, "image_url": "images/cr-v.jpg", "transmission": "Tự động" },
            { "id": 22, "name": "Huyndai i10", "category": "4 chỗ", "price": 500000, "image_url": "images/huyn_i10.jpg", "transmission": "Số sàn" },
            { "id": 23, "name": "Mercedes E300", "category": "5 chỗ", "price": 4500000, "image_url": "images/e300.jpg", "transmission": "Tự động" },
            { "id": 24, "name": "Ford Ranger", "category": "5 chỗ", "price": 1400000, "image_url": "images/foer_ranger.jpg", "transmission": "Tự động" }
        ];

        function renderCars() {
            const list = document.getElementById('car-list');
            list.innerHTML = carData.map(car => `
                <div class="car-card p-6 flex flex-col h-full">
                    <div class="w-full h-48 bg-slate-100 rounded-[2rem] overflow-hidden mb-6">
                        <img src="${car.image_url}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-grow">
                        <span class="text-[9px] font-black text-blue-600 uppercase tracking-widest">${car.category} | ${car.transmission}</span>
                        <h3 class="text-xl font-black text-slate-900 uppercase italic mb-4 mt-1">${car.name}</h3>
                    </div>
                    <div class="pt-6 border-t border-slate-100 flex items-center justify-between">
                        <div>
                            <p class="text-[10px] text-slate-400 font-bold uppercase">Giá thuê</p>
                            <p class="text-xl font-black text-slate-900">${car.price.toLocaleString('vi-VN')}đ<span class="text-xs font-medium text-slate-400">/ngày</span></p>
                        </div>
                        <button onclick="bookCar(${car.id})" class="btn-rent text-white px-6 py-3 rounded-2xl font-black uppercase text-[10px] shadow-lg shadow-blue-200">
                            Thuê xe ngay
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function bookCar(id) {
            // Chuyển sang trang booking kèm ID xe
            window.location.href = `booking-car.html?id=${id}`;
        }

        window.onload = renderCars;
    </script>
</body>
</html>
