<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Toán Thuê Xe - TrangHy Luxury</title>
    
    <link rel="icon" href="data:,">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/material_blue.css">

   <style>
    :root {
        --primary: #2563eb;
        --primary-dark: #1e40af;
        --primary-gradient: linear-gradient(135deg, #2563eb, #7c3aed);
        --bg-body: #f8fafc;
        --card-bg: #ffffff;
        --text-main: #1e293b;
        --text-muted: #64748b;
        --border: #e2e8f0;
        --accent: #f59e0b;
        --success: #22c55e;
    }

    body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: var(--bg-body);
        color: var(--text-main);
        margin: 0; padding: 20px;
        background-image: radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.05) 0px, transparent 50%), radial-gradient(at 100% 0%, rgba(124, 58, 237, 0.05) 0px, transparent 50%);
    }

    .booking-container {
        max-width: 1100px; width: 100%; background: var(--card-bg);
        border-radius: 32px; 
        overflow: visible; 
        margin: 60px auto;
        box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        border: 1px solid white;
        animation: fadeIn 0.6s ease-out;
        position: relative;
    }

    .flatpickr-calendar {
        z-index: 99999 !important;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05) !important;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .back-btn {
        position: absolute; top: 20px; left: 20px; z-index: 100;
        background: var(--card-bg); border: 1px solid var(--border);
        color: var(--text-main); padding: 10px 20px; border-radius: 12px;
        text-decoration: none; font-weight: 700; font-size: 0.9rem;
        transition: 0.3s; display: flex; align-items: center; gap: 8px;
    }
    .back-btn:hover { background: var(--primary); color: white; transform: translateX(-5px); }

    .car-hero-section { 
        position: relative; 
        height: 400px; 
        border-radius: 32px 32px 0 0; 
        overflow: hidden; 
    }
    .car-hero-section img { width: 100%; height: 100%; object-fit: cover; }
    
    .car-info-overlay {
        position: absolute; bottom: 0; left: 0; right: 0;
        padding: 80px 40px 40px;
        background: linear-gradient(transparent, rgba(0,0,0,0.8));
        color: white;
    }
    
    .car-badge {
        position: absolute; top: 30px; left: 40px;
        background: var(--primary-gradient); color: white;
        padding: 8px 20px; border-radius: 50px; font-size: 0.8rem; font-weight: 800;
    }

    .specs-grid { 
        display: grid; grid-template-columns: repeat(4, 1fr); 
        gap: 20px; padding: 30px 40px; background: #f1f5f9;
    }
    .spec-item {
        background: white; padding: 15px; border-radius: 16px;
        text-align: center; border: 1px solid var(--border);
    }
    .spec-item i { color: var(--primary); margin-bottom: 8px; display: block; }

    .booking-form-content { padding: 40px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; }
    h3 { font-size: 1.25rem; font-weight: 800; margin-bottom: 25px; display: flex; align-items: center; gap: 12px; }

    .input-group { margin-bottom: 20px; position: relative; }
    label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; }
    input, select {
        width: 100%; padding: 14px 18px; background: #f8fafc;
        border: 2px solid var(--border); border-radius: 14px; outline: none; transition: 0.3s;
    }
    input:focus { border-color: var(--primary); background: white; }

    .driver-card {
        display: flex; justify-content: space-between; align-items: center;
        background: #eff6ff; padding: 20px; border-radius: 18px; border: 2px solid #dbeafe;
    }

    .summary-box {
        margin-top: 40px; padding: 40px; border-top: 2px solid var(--border);
        text-align: center; background: linear-gradient(to bottom, white, #f1f5f9);
    }
    .total-price-tag { font-size: 3rem; font-weight: 900; color: var(--primary); }

    .btn-confirm {
        width: 100%; max-width: 400px; padding: 20px; 
        background: var(--primary-gradient); color: white;
        border: none; border-radius: 18px; font-weight: 800; font-size: 1.2rem;
        cursor: pointer; transition: 0.4s;
    }
    .btn-confirm:hover:not(:disabled) { transform: translateY(-3px); opacity: 0.9; }
    .btn-confirm:disabled { background: #cbd5e1; cursor: not-allowed; }

    .modal {
        display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(8px); z-index: 10000; justify-content: center; align-items: center; padding: 20px;
    }
    .modal-content {
        background: white; padding: 40px; border-radius: 32px; width: 100%; max-width: 450px; text-align: center;
    }

    @media (max-width: 850px) {
        .form-grid { grid-template-columns: 1fr; }
        .specs-grid { grid-template-columns: repeat(2, 1fr); }
        body { padding: 10px; }
        .booking-container { margin: 20px auto; }
        
        .flatpickr-calendar {
            left: 50% !important;
            transform: translateX(-50%) !important;
        }
    }
</style>
</head>
<body>

<a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> TRANG CHỦ</a>

<div class="booking-container">
    <div class="car-hero-section">
        <div class="car-badge" id="car-category">LUXURY</div>
        <img id="car-img" src="" alt="Car Image">
        <div class="car-info-overlay">
            <h1 id="car-name" style="margin:0; font-size: 2.5rem; font-weight: 800;">Đang tải...</h1>
            <p id="car-price-unit" style="color: #cbd5e1; font-size: 1.1rem; margin-top: 8px;">-- / ngày</p>
        </div>
    </div>

    <div class="specs-grid">
        <div class="spec-item"><i class="fa-solid fa-gas-pump"></i><span>Nhiên liệu</span><b id="spec-fuel">-</b></div>
        <div class="spec-item"><i class="fa-solid fa-gear"></i><span>Hộp số</span><b id="spec-transmission">-</b></div>
        <div class="spec-item"><i class="fa-solid fa-bolt"></i><span>Động cơ</span><b id="spec-engine">-</b></div>
        <div class="spec-item"><i class="fa-solid fa-chair"></i><span>Chỗ ngồi</span><b id="spec-seats">-</b></div>
    </div>

    <form id="rental-form" class="booking-form-content">
        <div class="form-grid">
            <div class="col-left">
                <h3><i class="fa-solid fa-calendar-days"></i> 1. CHI TIẾT LỊCH TRÌNH</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-group">
                        <label>Ngày nhận xe</label>
                        <input type="text" id="pickup-date" placeholder="Chọn ngày" readonly required>
                    </div>
                    <div class="input-group">
                        <label>Ngày trả xe</label>
                        <input type="text" id="return-date" placeholder="Chọn ngày" readonly required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Hình thức nhận xe</label>
                    <select id="location-select">
                        <option value="Tại Gara">Nhận xe tại Gara (Miễn phí)</option>
                        <option value="Tại Nhà">Giao xe tận nơi (Phí thỏa thuận)</option>
                    </select>
                    <input type="text" id="cust-location" placeholder="Số nhà, tên đường, phường/xã..." style="margin-top: 15px; display: none;">
                </div>

                <div class="driver-card">
                    <div>
                        <div style="font-weight: 800;">Thuê tài xế riêng</div>
                        <div style="font-size: 0.8rem; color: var(--text-muted);">+500.000đ/ngày</div>
                    </div>
                    <input type="checkbox" id="with-driver" style="width: 24px; height: 24px;">
                </div>
            </div>

            <div class="col-right">
                <h3><i class="fa-solid fa-id-card-clip"></i> 2. THÔNG TIN KHÁCH HÀNG</h3>
                <div class="input-group">
                    <label>Họ và tên (In hoa có dấu)</label>
                    <input type="text" id="cust-fullname" placeholder="VÍ DỤ: BÙI VĂN TRANG" required>
                </div>
                
                <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 15px;">
                    <div class="input-group">
                        <label>Số điện thoại Zalo</label>
                        <input type="tel" id="cust-phone" placeholder="Số điện thoại" pattern="[0-9]{10}" maxlength="10" required>
                    </div>
                    <div class="input-group">
                        <label>Ngày sinh (Trên 18 tuổi)</label>
                        <input type="text" id="cust-dob" inputmode="numeric" placeholder="DD/MM/YYYY" maxlength="10" required>
                    </div>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 15px;">
                    <div class="input-group">
                        <label>Hạng GPLX</label>
                        <select id="cust-license-type">
                            <option value="B1">B1</option>
                            <option value="B2" selected>B2</option>
                            <option value="C">C</option>
                            <option value="D">D</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Số GPLX (12 số)</label>
                        <input type="text" id="cust-license-no" placeholder="Nhập 12 số" pattern="[0-9]{12}" maxlength="12" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Số CCCD / Định danh</label>
                    <input type="text" id="cust-cccd" placeholder="Nhập 12 số CCCD" pattern="[0-9]{12}" maxlength="12" required>
                </div>
            </div>
        </div>

        <div class="summary-box">
            <p style="color: var(--text-muted); font-weight: 700;">TỔNG TIỀN DỰ KIẾN (<span id="calc-days-text">1</span> NGÀY)</p>
            <div class="total-price-tag" id="total-price">0 VNĐ</div>
            <button type="submit" class="btn-confirm" id="submit-btn">TIẾN HÀNH ĐẶT CỌC NGAY</button>
            <div style="margin-top: 20px;">
                <input type="checkbox" id="agree" required checked>
                <label for="agree" style="display:inline; font-size: 0.8rem; cursor: pointer;">Tôi cam kết các thông tin trên là chính xác.</label>
            </div>
        </div>
    </form>
</div>

<div id="payment-modal" class="modal">
    <div class="modal-content">
        <h2 style="margin-bottom: 25px;">XÁC NHẬN ĐẶT CỌC</h2>
        <img id="qr-code" src="" alt="Mã QR" style="width: 260px; height: 260px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #eee;">
        <div style="text-align: left; background: #f8fafc; padding: 20px; border-radius: 20px; margin-bottom: 25px;">
            <p>Xe: <b id="m-car">...</b></p>
            <p>Tổng: <b id="m-total" style="color: var(--primary);">0 VNĐ</b></p>
            <p>Nội dung: <b id="m-memo" style="color: var(--accent);">...</b></p>
        </div>
        <button class="btn-confirm" onclick="bookingApp.finish()">TÔI ĐÃ CHUYỂN KHOẢN</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://npmcdn.com/flatpickr/dist/l10n/vn.js"></script>

<script>
    const bookingApp = {
        state: { car: null, days: 1, total: 0 },
        CONFIG: {
            BANK_ID: "MB",
            ACC_NO: "0353979614",
            ACC_NAME: "BUI VAN TRANG",
            DRIVER_FEE: 500000,
            ZALO: "https://zalo.me/0353979614",
            SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbzDi9Cjw1E6cINUdmTn15HpQ3Cebb49fp9PKjJKzgGKzfXs3DQ5dVVwPjLF2YZ5XYlp/exec'
        },

        async init() {
            const id = new URLSearchParams(window.location.search).get('id');
            if (!id) return window.location.href = 'index.html';
            console.log("🚀 System Ready | TrangHy Luxury");
            
            await this.loadCar(id);
            this.setupPickers();
            this.bindEvents();
        },

        async loadCar(id) {
            try {
                const res = await fetch('cars.json');
                if (!res.ok) throw new Error("Không thể tải dữ liệu xe");
                const cars = await res.json();
                const car = cars.find(c => String(c.id) === String(id));
                if (car) {
                    this.state.car = car;
                    document.getElementById('car-name').innerText = car.name;
                    document.getElementById('car-img').src = car.image_url || car.image;
                    document.getElementById('car-price-unit').innerText = `${this.fmt(car.price)} / ngày`;
                    document.getElementById('car-category').innerText = (car.category || "LUXURY").toUpperCase();
                    document.getElementById('spec-fuel').innerText = car.fuel || "Xăng";
                    document.getElementById('spec-transmission').innerText = car.transmission || "Tự động";
                    document.getElementById('spec-engine').innerText = car.engine || "2.0L";
                    document.getElementById('spec-seats').innerText = car.seats || "5 Chỗ";
                    this.calc();
                }
            } catch (e) { 
                console.error("Lỗi tải xe:", e);
                alert("Không tìm thấy thông tin xe. Vui lòng quay lại trang chủ.");
            }
        },

        setupPickers() {
            const common = { dateFormat: "d/m/Y", locale: "vn", disableMobile: true };
            
            const p = flatpickr("#pickup-date", { 
                ...common, 
                minDate: "today",
                onChange: (dates) => { 
                    r.set('minDate', dates[0]); 
                    this.calc(); 
                } 
            });
            
            const r = flatpickr("#return-date", { 
                ...common, 
                minDate: "today", 
                onChange: () => this.calc() 
            });
            // Đã xóa flatpickr ngày sinh tại đây
        },

        bindEvents() {
            document.getElementById('with-driver').onchange = () => this.calc();
            
            document.getElementById('location-select').onchange = (e) => {
                const isHome = e.target.value === 'Tại Nhà';
                const input = document.getElementById('cust-location');
                input.style.display = isHome ? 'block' : 'none';
                input.required = isHome;
            };

            document.getElementById('rental-form').onsubmit = (e) => { 
                e.preventDefault(); 
                this.submit(); 
            };
            
            document.getElementById('cust-fullname').oninput = (e) => { 
                e.target.value = e.target.value.toUpperCase(); 
            };
            
            ['cust-phone', 'cust-cccd', 'cust-license-no'].forEach(id => {
                document.getElementById(id).oninput = (e) => { 
                    e.target.value = e.target.value.replace(/[^0-9]/g, ''); 
                };
            });

            // NÂNG CẤP: Logic nhập tay ngày sinh tự động thêm dấu /
            const dobInput = document.getElementById('cust-dob');
            dobInput.oninput = (e) => {
                let v = e.target.value.replace(/\D/g, ''); 
                if (v.length > 8) v = v.substring(0, 8);
                let finalVal = "";
                if (v.length > 0) {
                    finalVal += v.substring(0, 2);
                    if (v.length > 2) {
                        finalVal += '/' + v.substring(2, 4);
                        if (v.length > 4) {
                            finalVal += '/' + v.substring(4, 8);
                        }
                    }
                }
                e.target.value = finalVal;
            };

            // NÂNG CẤP: Kiểm tra tuổi khi nhập xong ngày sinh
            dobInput.onblur = (e) => {
                const val = e.target.value;
                if (val.length === 10) {
                    const parts = val.split('/');
                    const d = parseInt(parts[0]);
                    const m = parseInt(parts[1]);
                    const y = parseInt(parts[2]);
                    const today = new Date();
                    const birthDate = new Date(y, m - 1, d);
                    let age = today.getFullYear() - birthDate.getFullYear();
                    const monthDiff = today.getMonth() - birthDate.getMonth();
                    if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) age--;

                    if (m > 12 || d > 31 || y < 1940 || y > today.getFullYear()) {
                        alert("Ngày sinh không hợp lệ!");
                        e.target.value = "";
                    } else if (age < 18) {
                        alert("Yêu cầu khách hàng từ đủ 18 tuổi!");
                        e.target.value = "";
                    } else {
                        // Tự động nhảy sang ô tiếp theo nếu hợp lệ
                        document.getElementById('cust-license-no').focus();
                    }
                }
            };
        },

        calc() {
            const s = document.getElementById('pickup-date')._flatpickr?.selectedDates[0];
            const e = document.getElementById('return-date')._flatpickr?.selectedDates[0];
            
            if (s && e && this.state.car) {
                let diff = Math.ceil((e - s) / (1000 * 60 * 60 * 24));
                if (diff <= 0) diff = 1; 
                
                this.state.days = diff;
                let total = diff * this.state.car.price;
                if (document.getElementById('with-driver').checked) {
                    total += (diff * this.CONFIG.DRIVER_FEE);
                }
                
                this.state.total = total;
                document.getElementById('total-price').innerText = this.fmt(total);
                document.getElementById('calc-days-text').innerText = diff;
            }
        },

        fmt(n) { return new Intl.NumberFormat('vi-VN').format(n) + " VNĐ"; },

        async submit() {
            const btn = document.getElementById('submit-btn');
            const locType = document.getElementById('location-select').value;
            const locVal = document.getElementById('cust-location').value;

            if (locType === "Tại Nhà" && !locVal.trim()) {
                alert("Vui lòng nhập địa chỉ nhận xe cụ thể!");
                document.getElementById('cust-location').focus();
                return;
            }

            btn.disabled = true; 
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> ĐANG GỬI THÔNG TIN...';

            const payload = {
                Ten: document.getElementById('cust-fullname').value,
                SDT: document.getElementById('cust-phone').value,
                CCCD: document.getElementById('cust-cccd').value,
                GPLX: document.getElementById('cust-license-no').value,
                Hang: document.getElementById('cust-license-type').value,
                NgaySinh: document.getElementById('cust-dob').value,
                Xe: this.state.car.name,
                NgayThue: document.getElementById('pickup-date').value,
                NgayTra: document.getElementById('return-date').value,
                DiaChi: locType === "Tại Nhà" ? locVal : "Tại Gara",
                TongTien: this.fmt(this.state.total),
                GhiChu: document.getElementById('with-driver').checked ? "THUÊ TÀI XẾ" : "TỰ LÁI"
            };

            try {
                await fetch(this.CONFIG.SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload) 
                });
                
                const memo = `DAT XE ${this.state.car.id} ${payload.SDT}`;
                document.getElementById('m-car').innerText = payload.Xe;
                document.getElementById('m-total').innerText = payload.TongTien;
                document.getElementById('m-memo').innerText = memo;
                
                const qrUrl = `https://img.vietqr.io/image/${this.CONFIG.BANK_ID}-${this.CONFIG.ACC_NO}-compact2.png?amount=${this.state.total}&addInfo=${encodeURIComponent(memo)}&accountName=${encodeURIComponent(this.CONFIG.ACC_NAME)}`;
                document.getElementById('qr-code').src = qrUrl;
                
                document.getElementById('payment-modal').style.display = 'flex';
            } catch(err) { 
                console.error("Lỗi:", err); 
                alert("Hệ thống bận, vui lòng thử lại hoặc liên hệ Zalo!");
            } finally {
                btn.disabled = false; 
                btn.innerText = "TIẾN HÀNH ĐẶT CỌC NGAY";
            }
        },

        finish() {
            alert("Cảm ơn bạn! Vui lòng gửi ảnh chụp màn hình chuyển khoản qua Zalo để nhân viên xác nhận đơn hàng.");
            window.location.href = this.CONFIG.ZALO;
        }
    };

    document.addEventListener('DOMContentLoaded', () => bookingApp.init());
    
    window.onclick = (e) => {
        if (e.target == document.getElementById('payment-modal')) {
            document.getElementById('payment-modal').style.display = 'none';
        }
    }
</script>

</body>
</html>
