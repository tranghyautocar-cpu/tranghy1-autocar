<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thanh Toán Thuê Xe - TrangHy Luxury</title>

<link rel="icon" href="data:,">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<link rel="stylesheet" href="https://npmcdn.com/flatpickr/dist/themes/material_blue.css">

<style>

:root{
--primary:#2563eb;
--primary-gradient:linear-gradient(135deg,#2563eb,#7c3aed);
--bg:#f8fafc;
--card:#ffffff;
--border:#e2e8f0;
--text:#1e293b;
--muted:#64748b;
}

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:var(--bg);
margin:0;
padding:20px;
}

.booking-container{
max-width:1100px;
margin:auto;
background:var(--card);
border-radius:30px;
overflow:hidden;
box-shadow:0 20px 25px rgba(0,0,0,0.1);
}

.back-btn{
position:absolute;
top:20px;
left:20px;
background:white;
padding:10px 18px;
border-radius:12px;
text-decoration:none;
color:black;
font-weight:700;
border:1px solid var(--border);
}

.car-hero-section{
height:380px;
position:relative;
}

.car-hero-section img{
width:100%;
height:100%;
object-fit:cover;
}

.car-info-overlay{
position:absolute;
bottom:0;
left:0;
right:0;
padding:80px 40px 40px;
background:linear-gradient(transparent,rgba(0,0,0,0.8));
color:white;
}

.specs-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:30px;
background:#f1f5f9;
}

.spec-item{
background:white;
padding:15px;
border-radius:15px;
text-align:center;
border:1px solid var(--border);
}

.spec-item i{
display:block;
margin-bottom:6px;
color:var(--primary);
}

.spec-item span{
display:block;
font-size:13px;
color:var(--muted);
}

.spec-item b{
display:block;
margin-top:4px;
}

.booking-form-content{
padding:40px;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

input,select{
width:100%;
padding:14px;
border-radius:12px;
border:2px solid var(--border);
background:#f8fafc;
outline:none;
}

input:focus{
border-color:var(--primary);
background:white;
}

.driver-card{
display:flex;
justify-content:space-between;
align-items:center;
background:#eff6ff;
padding:20px;
border-radius:15px;
margin-top:20px;
}

.summary-box{
margin-top:40px;
padding:40px;
border-top:2px solid var(--border);
text-align:center;
}

.total-price-tag{
font-size:40px;
font-weight:900;
color:var(--primary);
}

.btn-confirm{
margin-top:20px;
padding:18px;
border:none;
border-radius:16px;
background:var(--primary-gradient);
color:white;
font-weight:800;
cursor:pointer;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:40px;
border-radius:25px;
max-width:420px;
width:100%;
text-align:center;
max-height:90vh;
overflow:auto;
}

</style>
</head>

<body>

<a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> TRANG CHỦ</a>

<div class="booking-container">

<div class="car-hero-section">
<img id="car-img">

<div class="car-info-overlay">
<h1 id="car-name">Đang tải...</h1>
<p id="car-price-unit">-- / ngày</p>
</div>
</div>

<div class="specs-grid">
<div class="spec-item">
<i class="fa-solid fa-gas-pump"></i>
<span>Nhiên liệu</span>
<b id="spec-fuel">-</b>
</div>

<div class="spec-item">
<i class="fa-solid fa-gear"></i>
<span>Hộp số</span>
<b id="spec-transmission">-</b>
</div>

<div class="spec-item">
<i class="fa-solid fa-bolt"></i>
<span>Động cơ</span>
<b id="spec-engine">-</b>
</div>

<div class="spec-item">
<i class="fa-solid fa-chair"></i>
<span>Chỗ ngồi</span>
<b id="spec-seats">-</b>
</div>
</div>

<form id="rental-form" class="booking-form-content">

<div class="form-grid">

<div>

<h3>1. Lịch trình</h3>

<input type="text" id="pickup-date" placeholder="Ngày nhận xe" readonly required>

<br><br>

<input type="text" id="return-date" placeholder="Ngày trả xe" readonly required>

<div class="driver-card">

<div>
<b>Thuê tài xế</b>
<div style="font-size:13px;color:#666">
+500.000đ/ngày
</div>
</div>

<input type="checkbox" id="with-driver">

</div>

</div>

<div>

<h3>2. Thông tin khách</h3>

<input id="cust-fullname" placeholder="Họ tên" required autocomplete="off">

<br><br>

<input id="cust-phone" placeholder="SĐT" required pattern="[0-9]{10}" maxlength="10">

<br><br>

<input id="cust-cccd" placeholder="CCCD 12 số" maxlength="12">

</div>

</div>

<div class="summary-box">

<p>TỔNG TIỀN (<span id="calc-days-text">1</span> NGÀY)</p>

<div id="total-price" class="total-price-tag">0 VNĐ</div>

<button class="btn-confirm" id="submit-btn">
TIẾN HÀNH ĐẶT CỌC
</button>

</div>

</form>

</div>

<div id="payment-modal" class="modal">

<div class="modal-content">

<h2>XÁC NHẬN ĐẶT CỌC</h2>

<img id="qr-code" style="width:250px">

<p>Xe: <b id="m-car"></b></p>

<p>Tổng: <b id="m-total"></b></p>

<p>Nội dung: <b id="m-memo"></b></p>

<button class="btn-confirm" onclick="bookingApp.finish()">
TÔI ĐÃ CHUYỂN KHOẢN
</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>

const $=id=>document.getElementById(id)

const bookingApp={

state:{car:null,days:1,total:0},

CONFIG:{
BANK_ID:"MB",
ACC_NO:"0353979614",
ACC_NAME:"BUI VAN TRANG",
DRIVER_FEE:500000,
ZALO:"https://zalo.me/0353979614"
},

async init(){

const id=new URLSearchParams(location.search).get('id')

if(!id) location.href="index.html"

await this.loadCar(id)

this.setupPickers()

this.bindEvents()

},

async loadCar(id){

try{

const res=await fetch("./cars.json")

const cars=await res.json()

const car=cars.find(c=>String(c.id)===String(id))

if(!car) throw "Không tìm thấy xe"

this.state.car=car

$('car-name').innerText=car.name

$('car-img').src=car.image

$('car-price-unit').innerText=this.fmt(car.price)+"/ ngày"

$('spec-fuel').innerText=car.fuel||"Xăng"

$('spec-transmission').innerText=car.transmission||"Tự động"

$('spec-engine').innerText=car.engine||"2.0L"

$('spec-seats').innerText=car.seats||"5 chỗ"

}catch(e){

alert("Không tải được xe")

}

},

setupPickers(){

flatpickr("#pickup-date",{minDate:"today",dateFormat:"d/m/Y",onChange:()=>this.calc()})

flatpickr("#return-date",{minDate:"today",dateFormat:"d/m/Y",onChange:()=>this.calc()})

},

bindEvents(){

$('with-driver').onchange=()=>this.calc()

$('rental-form').onsubmit=e=>{
e.preventDefault()
this.submit()
}

},

calc(){

const s=$('pickup-date')._flatpickr?.selectedDates[0]

const e=$('return-date')._flatpickr?.selectedDates[0]

if(!s||!e||!this.state.car) return

let diff=Math.max(1,Math.ceil((e-s)/86400000)+1)

this.state.days=diff

let total=diff*Number(this.state.car.price)

if($('with-driver').checked)
total+=diff*this.CONFIG.DRIVER_FEE

this.state.total=total

$('total-price').innerText=this.fmt(total)

$('calc-days-text').innerText=diff

},

fmt(n){
return new Intl.NumberFormat('vi-VN').format(n)+" VNĐ"
},

submit(){

if(this.state.total===0){
alert("Vui lòng chọn ngày thuê")
return
}

const memo=`DAT XE ${this.state.car.id}`

$('m-car').innerText=this.state.car.name
$('m-total').innerText=this.fmt(this.state.total)
$('m-memo').innerText=memo

$('qr-code').src=`https://img.vietqr.io/image/${this.CONFIG.BANK_ID}-${this.CONFIG.ACC_NO}-compact2.png?amount=${this.state.total}&addInfo=${memo}`

$('payment-modal').style.display="flex"

},

finish(){

alert("Cảm ơn bạn! Hãy gửi ảnh chuyển khoản qua Zalo.")

location.href=this.CONFIG.ZALO

}

}

document.addEventListener("DOMContentLoaded",()=>bookingApp.init())

window.onclick=e=>{
if(e.target==$('payment-modal'))
$('payment-modal').style.display="none"
}

</script>

</body>
</html>
