<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Toán - TrangHy Luxury</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <style>
        :root { --primary: #007bff; --primary-gradient: linear-gradient(135deg, #007bff, #00d1ff); --dark-bg: #0b0c10; --card-bg: #161b22; --input-bg: #1f242d; --text-main: #ffffff; --text-muted: #8b949e; --border: #30363d; --accent: #ff9f43; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--dark-bg); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .booking-container { max-width: 1000px; width: 100%; background: var(--card-bg); border-radius: 28px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .car-hero-section { position: relative; height: 300px; width: 100%; }
        .car-hero-section img { width: 100%; height: 100%; object-fit: cover; }
        .booking-form-content { padding: 40px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        h3 { font-size: 1.1rem; margin-bottom: 20px; color: var(--primary-light); display: flex; align-items: center; gap: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; color: white; outline: none; }
        .btn-confirm { width: 100%; padding: 18px; background: var(--primary-gradient); border: none; border-radius: 14px; color: white; font-weight: 700; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); padding: 30px; border-radius: 24px; text-align: center; max-width: 380px; border: 1px solid var(--border); }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="booking-container">
    <div class="car-hero-section">
        <img id="car-img" src="" alt="Car">
        <div style="position: absolute; bottom: 20px; left: 40px;">
            <h1 id="car-name" style="margin:0;">Đang tải...</h1>
        </div>
    </div>

    <form id="rental-form" class="booking-form-content">
        <div class="form-grid">
            <div class="col-left">
                <h3><i class="fa-solid fa-calendar"></i> 1. Lịch trình</h3>
                <div style="display: flex; gap: 10px;">
                    <div class="input-group" style="flex:1;"><label>Ngày nhận</label><input type="text" id="pickup-date" required></div>
                    <div class="input-group" style="flex:1;"><label>Ngày trả</label><input type="text" id="return-date" required></div>
                </div>
                <div class="input-group">
                    <label>Địa chỉ nhận xe</label>
                    <select id="loc-select"><option value="Tại Gara">Tại Gara (Free)</option><option value="Tại Nhà">Giao tận nơi</option></select>
                </div>
                <input type="text" id="cust-addr" placeholder="Nhập địa chỉ" style="display:none; margin-top:-10px; margin-bottom:10px;">
            </div>

            <div class="col-right">
                <h3><i class="fa-solid fa-user-check"></i> 2. Thông tin GPLX</h3>
                <div class="input-group"><label>Họ tên chủ lái</label><input type="text" id="cust-name" placeholder="NGUYEN VAN A" required></div>
                <div style="display: flex; gap: 10px;">
                    <div class="input-group" style="flex:1.5;"><label>Số GPLX (12 số)</label><input type="text" id="cust-gplx" pattern="[0-9]{12}" required></div>
                    <div class="input-group" style="flex:1;"><label>Ngày sinh</label><input type="text" id="cust-dob" placeholder="dd/mm/yyyy" required></div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="input-group" style="flex:1;"><label>Số CCCD</label><input type="text" id="cust-cccd" required></div>
                    <div class="input-group" style="flex:1;"><label>Hạng bằng</label><select id="cust-rank"><option>B1</option><option selected>B2</option><option>C</option></select></div>
                </div>
                <div class="input-group"><label>Số điện thoại</label><input type="tel" id="cust-phone" required></div>
            </div>
        </div>

        <div style="text-align: center; margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px;">
            <h2 id="total-price" style="color: var(--primary); font-size: 2rem;">0 VNĐ</h2>
            <button type="submit" class="btn-confirm" id="submit-btn">XÁC NHẬN ĐẶT XE</button>
        </div>
    </form>
</div>

<div id="payment-modal" class="modal">
    <div class="modal-content">
        <h3>QUÉT MÃ CỌC</h3>
        <img id="qr-code" src="" style="width: 100%; border-radius: 15px; margin: 15px 0;">
        <p id="m-memo" style="color: var(--primary); font-weight: bold;"></p>
        <button class="btn-confirm" onclick="location.href='https://zalo.me/0353979614'">TÔI ĐÃ CHUYỂN KHOẢN</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    const app = {
        config: { SCRIPT_URL: 'URL_APPS_SCRIPT_CUA_BAN', BANK: 'MB', ACC: '0353979614' },
        state: { car: null, total: 0 },
        async init() {
            const id = new URLSearchParams(window.location.search).get('id');
            const res = await fetch('cars.json');
            const cars = await res.json();
            this.state.car = cars.find(c => String(c.id) === id);
            if(this.state.car) {
                document.getElementById('car-name').innerText = this.state.car.name;
                document.getElementById('car-img').src = this.state.car.image;
                this.calc();
            }
            flatpickr("#pickup-date", { minDate: "today", onChange: () => this.calc() });
            flatpickr("#return-date", { minDate: "today", onChange: () => this.calc() });
            flatpickr("#cust-dob", { dateFormat: "d/m/Y" });
            document.getElementById('loc-select').onchange = (e) => document.getElementById('cust-addr').style.display = e.target.value === 'Tại Nhà' ? 'block' : 'none';
            document.getElementById('rental-form').onsubmit = (e) => this.submit(e);
        },
        calc() {
            // Logic tính tiền đơn giản (Giá xe * 1 ngày mẫu)
            this.state.total = this.state.car ? this.state.car.price : 0;
            document.getElementById('total-price').innerText = new Intl.NumberFormat('vi-VN').format(this.state.total) + " VNĐ";
        },
        async submit(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn'); btn.innerText = "ĐANG GỬI..."; btn.disabled = true;
            const data = {
                ThoiGian: new Date().toLocaleString(),
                Xe: this.state.car.name,
                Khach: document.getElementById('cust-name').value,
                SDT: document.getElementById('cust-phone').value,
                CCCD: document.getElementById('cust-cccd').value,
                NgayThue: document.getElementById('pickup-date').value,
                NgayTra: document.getElementById('return-date').value,
                TongTien: this.state.total,
                GPLX: document.getElementById('cust-gplx').value,
                HangBang: document.getElementById('cust-rank').value,
                NgaySinh: document.getElementById('cust-dob').value,
                GhiChu: document.getElementById('loc-select').value + " " + document.getElementById('cust-addr').value
            };
            await fetch(this.config.SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            const memo = `DATXE ${data.SDT}`;
            document.getElementById('qr-code').src = `https://img.vietqr.io/image/${this.config.BANK}-${this.config.ACC}-compact2.png?amount=${this.state.total}&addInfo=${memo}`;
            document.getElementById('m-memo').innerText = "Nội dung: " + memo;
            document.getElementById('payment-modal').style.display = 'flex';
        }
    };
    app.init();
</script>
</body>
</html>
