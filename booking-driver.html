<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thuê Tài Xế Riêng | TrangHy Autocar</title>
    
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #007bff;
            --primary-light: #00d1ff;
            --primary-gradient: linear-gradient(135deg, #007bff, #00d1ff);
            --dark-bg: #0b0c10;
            --card-bg: #161b22;
            --input-bg: #1f242d;
            --text-main: #ffffff;
            --text-muted: #8b949e;
            --border: #30363d;
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* Ẩn thanh cuộn nhưng vẫn cuộn được */
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% -20%, #1c2d4d, var(--dark-bg));
            color: var(--text-main);
            margin: 0; padding: 10px;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        .back-btn {
            position: absolute; top: 15px; left: 15px; z-index: 100;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            color: white; padding: 10px 18px;
            border-radius: 12px; text-decoration: none;
            font-weight: 600; font-size: 0.85rem;
            display: flex; align-items: center; gap: 8px;
            transition: var(--transition);
        }
        @media (min-width: 851px) { .back-btn { position: fixed; top: 25px; left: 25px; } }
        .back-btn:hover { background: var(--primary); transform: translateX(-5px); box-shadow: 0 0 15px var(--primary); }

        .container { max-width: 1000px; width: 100%; margin-top: 60px; animation: fadeInUp 0.8s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .header-section { text-align: center; margin-bottom: 30px; padding: 0 15px; }
        .header-section h1 { 
            font-size: clamp(1.8rem, 5vw, 2.5rem); font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .booking-card {
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow);
            position: relative;
        }

        .form-content { padding: clamp(15px, 4vw, 35px); }
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        
        h3 { color: var(--primary-light); font-size: 0.95rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 10px; letter-spacing: 1px; }

        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }
        
        input {
            width: 100%; padding: 14px; background: var(--input-bg);
            border: 1px solid var(--border); border-radius: 12px; color: white;
            transition: var(--transition); font-size: 0.95rem; outline: none;
        }
        input:focus { border-color: var(--primary); background: #252a33; box-shadow: 0 0 15px rgba(0,123,255,0.1); }

        .price-panel {
            background: linear-gradient(135deg, rgba(0, 123, 255, 0.1), rgba(0, 209, 255, 0.05));
            border: 1px solid rgba(0, 123, 255, 0.2);
            padding: 20px; border-radius: 20px; margin-top: 25px; text-align: center;
        }
        .price-panel h2 { font-size: clamp(2rem, 8vw, 2.8rem); color: var(--primary-light); margin: 5px 0; font-weight: 800; }

        .btn-group { display: grid; grid-template-columns: 1.8fr 1fr; gap: 15px; margin-top: 30px; }
        .btn-main {
            padding: 16px; border: none; border-radius: 14px; font-weight: 700;
            cursor: pointer; transition: var(--transition); font-size: 0.95rem;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary { background: var(--primary-gradient); color: white; }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-secondary { background: #21262d; color: white; border: 1px solid var(--border); text-decoration: none; }

        /* MODAL THANH TOÁN TỐI ƯU */
        #payment-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 9999; display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); padding: 15px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-box {
            background: #1c2128; padding: 0; border-radius: 28px; 
            max-width: 420px; width: 100%; text-align: center; border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            max-height: 95vh; overflow-y: auto;
            scrollbar-width: none;
        }
        .modal-box::-webkit-scrollbar { display: none; }

        .modal-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .modal-header h4 { margin: 0; color: var(--primary-light); letter-spacing: 1px; }

        .modal-body { padding: 25px; }

        .qr-wrapper {
            background: #ffffff; padding: 15px; border-radius: 20px;
            display: inline-block; margin-bottom: 20px;
            box-shadow: 0 0 25px rgba(0, 123, 255, 0.2);
        }
        #qr-code { max-width: 240px; width: 100%; height: auto; display: block; border-radius: 8px; }

        .amount-tag {
            background: var(--input-bg); padding: 15px; border-radius: 16px;
            margin-bottom: 25px; border: 1px solid var(--border);
        }
        .amount-tag span { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; }
        .amount-tag strong { font-size: 1.8rem; color: var(--primary-light); font-weight: 800; }

        /* FLATICKR DARK THEME OVERRIDE */
        .flatpickr-calendar { background: #1f242d !important; border: 1px solid #30363d !important; }
        .flatpickr-day.selected { background: var(--primary) !important; border-color: var(--primary) !important; }

        @media (max-width: 850px) {
            .grid-layout { grid-template-columns: 1fr; gap: 10px; }
            .btn-group { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn"><i class="fa-solid fa-chevron-left"></i> Quay lại</a>

    <div class="container">
        <div class="header-section">
            <h1>Đặt Tài Xế Riêng</h1>
            <p>Dịch vụ tài xế chuyên nghiệp từ TrangHy Autocar</p>
        </div>

        <div class="booking-card">
            <form id="driver-booking-form" class="form-content">
                <div class="grid-layout">
                    <div class="col">
                        <h3><i class="fa-solid fa-calendar-day"></i> Lịch trình</h3>
                        <div class="input-group">
                            <label>Ngày bắt đầu</label>
                            <input type="text" id="dr-start-date" placeholder="Chọn ngày đi" readonly required>
                        </div>
                        <div class="input-group">
                            <label>Ngày kết thúc</label>
                            <input type="text" id="dr-end-date" placeholder="Chọn ngày về" readonly required>
                        </div>
                        <div class="input-group">
                            <label>Yêu cầu ghi chú</label>
                            <input type="text" id="driver-pref" placeholder="Ví dụ: Tài xế rành đường tỉnh...">
                        </div>
                    </div>

                    <div class="col">
                        <h3><i class="fa-solid fa-id-card"></i> Khách hàng</h3>
                        <div class="input-group">
                            <label>Họ và tên</label>
                            <input type="text" id="dr-cust-fullname" placeholder="VÍ DỤ: NGUYỄN VĂN A" required style="text-transform: uppercase;">
                        </div>
                        <div class="input-group">
                            <label>Số điện thoại (Zalo)</label>
                            <input type="tel" id="dr-cust-phone" placeholder="Nhập 10 số" maxlength="10" required>
                        </div>
                        <div class="input-group">
                            <label>Số CCCD/Passport</label>
                            <input type="text" id="dr-cust-cccd" placeholder="Nhập 12 số CCCD" maxlength="12" required>
                        </div>
                    </div>
                </div>

                <div class="price-panel">
                    <p>Thanh toán tạm tính cho <strong id="dr-days-text" style="color: var(--primary-light)">1</strong> ngày thuê</p>
                    <h2 id="dr-total">500.000 VNĐ</h2>
                    <div style="display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 10px;">
                        <input type="checkbox" id="agree-contract-driver" required style="width: 18px; height: 18px; cursor: pointer;">
                        <label for="agree-contract-driver" style="cursor: pointer; font-size: 0.9rem;">Tôi cam kết các thông tin trên là chính xác</label>
                    </div>
                </div>

                <div class="btn-group">
                    <button type="submit" id="btn-submit" class="btn-main btn-primary">
                        <i class="fa-solid fa-qrcode"></i> THANH TOÁN NGAY
                    </button>
                    <button type="button" class="btn-main btn-secondary" onclick="window.print()">
                        <i class="fa-solid fa-file-contract"></i> XUẤT THÔNG TIN
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="payment-modal">
        <div class="modal-box">
            <div class="modal-header">
                <h4>QUÉT MÃ THANH TOÁN</h4>
            </div>
            <div class="modal-body">
                <div class="qr-wrapper">
                    <img id="qr-code" src="" alt="QR">
                </div>
                <div class="amount-tag">
                    <span>Tổng số tiền cần chuyển:</span>
                    <strong id="payment-final-amount">0đ</strong>
                </div>
                <button class="btn-main btn-primary" style="width: 100%;" onclick="bookingApp.confirmPayment()">
                    XÁC NHẬN ĐÃ CHUYỂN KHOẢN
                </button>
                <button onclick="bookingApp.closeModal()" style="background:none; border:none; color:var(--text-muted); margin-top:15px; cursor:pointer; text-decoration: underline; font-size: 0.85rem;">
                    Quay lại sửa thông tin
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/vn.js"></script>
    <script>
        const bookingApp = {
            config: {
                pricePerDay: 500000,
                bankId: "MB",
                accNo: "0353979614",
                accName: "BUI VAN TRANG",
                scriptUrl: "https://script.google.com/macros/s/AKfycbzDi9Cjw1E6cINUdmTn15HpQ3Cebb49fp9PKjJKzgGKzfXs3DQ5dVVwPjLF2YZ5XYlp/exec",
                zaloUrl: "https://zalo.me/0353979614"
            },
            state: { days: 1, total: 500000 },

            init() {
                this.setupPickers();
                this.bindEvents();
            },

            setupPickers() {
                const startPicker = flatpickr("#dr-start-date", {
                    minDate: "today",
                    dateFormat: "d/m/Y",
                    locale: "vn",
                    onChange: (selectedDates) => {
                        endPicker.set("minDate", selectedDates[0]);
                        this.calculatePrice();
                    }
                });

                const endPicker = flatpickr("#dr-end-date", {
                    minDate: "today",
                    dateFormat: "d/m/Y",
                    locale: "vn",
                    onChange: () => this.calculatePrice()
                });
            },

            bindEvents() {
                ['dr-cust-phone', 'dr-cust-cccd'].forEach(id => {
                    document.getElementById(id).addEventListener('input', (e) => {
                        e.target.value = e.target.value.replace(/[^0-9]/g, '');
                    });
                });

                document.getElementById('dr-cust-fullname').addEventListener('input', (e) => {
                    e.target.value = e.target.value.toUpperCase();
                });

                document.getElementById('driver-booking-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleSubmit();
                });
            },

            calculatePrice() {
                const sDate = document.getElementById('dr-start-date')._flatpickr.selectedDates[0];
                const eDate = document.getElementById('dr-end-date')._flatpickr.selectedDates[0];

                if (sDate && eDate) {
                    const diffTime = Math.abs(eDate - sDate);
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
                    this.state.days = diffDays;
                    this.state.total = diffDays * this.config.pricePerDay;
                    document.getElementById('dr-days-text').innerText = diffDays;
                    document.getElementById('dr-total').innerText = this.state.total.toLocaleString('vi-VN') + " VNĐ";
                }
            },

            async handleSubmit() {
                const btn = document.getElementById('btn-submit');
                btn.disabled = true;
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> ĐANG XỬ LÝ...';

                const data = {
                    Ten: document.getElementById('dr-cust-fullname').value,
                    SDT: document.getElementById('dr-cust-phone').value,
                    CCCD: document.getElementById('dr-cust-cccd').value,
                    NgayBD: document.getElementById('dr-start-date').value,
                    NgayKT: document.getElementById('dr-end-date').value,
                    GhiChu: document.getElementById('driver-pref').value || "Không có",
                    TongTien: this.state.total.toLocaleString('vi-VN') + " VNĐ"
                };

                try {
                    fetch(this.config.scriptUrl, {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify(data)
                    });

                    const memo = `THUE TAI XE ${data.SDT}`;
                    const qrUrl = `https://img.vietqr.io/image/${this.config.bankId}-${this.config.accNo}-compact2.png?amount=${this.state.total}&addInfo=${encodeURIComponent(memo)}&accountName=${encodeURIComponent(this.config.accName)}`;
                    
                    document.getElementById('qr-code').src = qrUrl;
                    document.getElementById('payment-final-amount').innerText = data.TongTien;
                    document.getElementById('payment-modal').style.display = 'flex';

                } catch (error) {
                    Swal.fire("Lỗi!", "Có lỗi xảy ra, vui lòng liên hệ Zalo.", "error");
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-qrcode"></i> THANH TOÁN NGAY';
                }
            },

            confirmPayment() {
                // Bước 1: Thông báo xác nhận thành công
                Swal.fire({
                    title: "Xác nhận thành công!",
                    text: "Hệ thống đã ghi nhận yêu cầu của bạn.",
                    icon: "success",
                    background: '#161b22',
                    color: '#ffffff',
                    confirmButtonColor: '#007bff',
                    confirmButtonText: "Tuyệt vời"
                }).then(() => {
                    // Bước 2: Hỏi ý kiến chuyển sang Zalo
                    Swal.fire({
                        title: "Kết nối Zalo?",
                        text: "Bạn có muốn chuyển sang Zalo để gửi biên lai và nhận thông tin tài xế sớm hơn không?",
                        icon: "question",
                        showCancelButton: true,
                        background: '#161b22',
                        color: '#ffffff',
                        confirmButtonColor: '#007bff',
                        cancelButtonColor: '#30363d',
                        confirmButtonText: "Chuyển sang Zalo",
                        cancelButtonText: "Để sau"
                    }).then((result) => {
                        if (result.isConfirmed) {
                            window.location.href = this.config.zaloUrl;
                        } else {
                            this.closeModal();
                            Swal.fire({
                                title: "Cảm ơn bạn!",
                                text: "Chúng tôi sẽ liên hệ sớm qua SĐT bạn cung cấp.",
                                icon: "info",
                                background: '#161b22',
                                color: '#ffffff',
                                confirmButtonColor: '#007bff'
                            });
                        }
                    });
                });
            },

            closeModal() {
                document.getElementById('payment-modal').style.display = 'none';
            }
        };

        document.addEventListener('DOMContentLoaded', () => bookingApp.init());
    </script>
</body>
</html>
