<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thuê Tài Xế Riêng | TrangHy Autocar</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #007bff;
            --primary-light: #00d1ff;
            --primary-gradient: linear-gradient(135deg, #007bff, #00d1ff);
            --dark-bg: #0b0c10;
            --card-bg: #161b22;
            --input-bg: #1f242d;
            --text-main: #ffffff;
            --text-muted: #8b949e;
            --border: #30363d;
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% -20%, #1c2d4d, var(--dark-bg));
            color: var(--text-main);
            margin: 0; padding: 20px;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Nút quay lại tinh chỉnh */
        .back-btn {
            position: fixed; top: 25px; left: 25px; z-index: 100;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            color: white; padding: 12px 24px;
            border-radius: 16px; text-decoration: none;
            font-weight: 600; font-size: 0.9rem;
            display: flex; align-items: center; gap: 10px;
            transition: var(--transition);
        }
        .back-btn:hover { 
            background: var(--primary); 
            transform: translateX(-5px);
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.4);
        }

        .container { max-width: 1000px; width: 100%; margin-top: 80px; animation: fadeInUp 0.8s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .header-section { text-align: center; margin-bottom: 40px; }
        .header-section h1 { 
            font-size: clamp(2rem, 5vw, 2.8rem); font-weight: 800; margin-bottom: 12px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .booking-card {
            background: var(--card-bg);
            border-radius: 32px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow);
            position: relative;
        }
        .booking-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--primary-gradient); }

        .form-content { padding: clamp(20px, 5vw, 50px); }
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        
        h3 { 
            color: var(--primary-light); font-size: 1.1rem; font-weight: 700; 
            margin-bottom: 25px; display: flex; align-items: center; gap: 12px; 
            text-transform: uppercase; letter-spacing: 1px;
        }

        .input-group { margin-bottom: 25px; position: relative; }
        label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 10px; font-weight: 500; }
        
        input, select {
            width: 100%; padding: 16px; background: var(--input-bg);
            border: 1px solid var(--border); border-radius: 16px; color: white;
            box-sizing: border-box; transition: var(--transition); font-size: 1rem;
        }
        input:focus { 
            border-color: var(--primary); outline: none; 
            background: #252a33; box-shadow: 0 0 15px rgba(0, 123, 255, 0.2);
        }

        .price-panel {
            background: linear-gradient(135deg, rgba(0, 123, 255, 0.1), rgba(0, 209, 255, 0.05));
            border: 1px solid rgba(0, 123, 255, 0.2);
            padding: 30px; border-radius: 24px; margin-top: 40px; text-align: center;
        }
        .price-panel h2 { font-size: 3rem; color: var(--primary-light); margin: 10px 0; font-weight: 800; }

        .btn-group { display: grid; grid-template-columns: 1.8fr 1fr; gap: 20px; margin-top: 40px; }
        .btn-main {
            padding: 20px; border: none; border-radius: 18px; font-weight: 700;
            cursor: pointer; transition: var(--transition); font-size: 1.05rem;
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .btn-primary { 
            background: var(--primary-gradient); color: white; 
            box-shadow: 0 10px 20px rgba(0, 123, 255, 0.3);
        }
        .btn-primary:hover { transform: translateY(-3px); filter: brightness(1.1); }
        .btn-secondary { background: #21262d; color: white; border: 1px solid var(--border); }
        .btn-secondary:hover { background: #30363d; }

        /* Modal Payment Hiệu ứng mới */
        .hidden { display: none !important; }
        #payment-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 9999; display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(12px); animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-box {
            background: var(--card-bg); padding: 35px; border-radius: 32px; 
            max-width: 420px; width: 90%; text-align: center; 
            border: 1px solid var(--border); box-shadow: var(--shadow);
            transform: scale(0.9); animation: scaleIn 0.3s forwards;
        }
        @keyframes scaleIn { to { transform: scale(1); } }

        @media (max-width: 850px) {
            .grid-layout { grid-template-columns: 1fr; gap: 0; }
            .btn-group { grid-template-columns: 1fr; }
            .form-content { padding: 25px; }
            .back-btn { padding: 10px 18px; font-size: 0.8rem; top: 15px; left: 15px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">
        <i class="fa-solid fa-chevron-left"></i> Quay lại
    </a>

    <div class="container">
        <div class="header-section">
            <h1>Đặt Tài Xế Riêng</h1>
            <p>TrangHy Autocar - Dịch vụ tài xế chuyên nghiệp 24/7</p>
        </div>

        <div class="booking-card">
            <form id="driver-booking-form" class="form-content" onsubmit="event.preventDefault(); handlePreBooking();">
                <div class="grid-layout">
                    <div class="col">
                        <h3><i class="fa-solid fa-calendar-days"></i> Chi tiết lịch trình</h3>
                        <div class="input-group">
                            <label><i class="fa-solid fa-clock"></i> Ngày bắt đầu</label>
                            <input type="text" id="dr-start-date" placeholder="Chọn ngày đi" readonly required>
                        </div>
                        <div class="input-group">
                            <label><i class="fa-solid fa-hourglass-end"></i> Ngày kết thúc</label>
                            <input type="text" id="dr-end-date" placeholder="Chọn ngày về" readonly required>
                        </div>
                        <div class="input-group">
                            <label><i class="fa-solid fa-comment-dots"></i> Ghi chú đặc biệt</label>
                            <input type="text" id="driver-pref" placeholder="Ví dụ: Tài xế biết tiếng Anh, xe 7 chỗ...">
                        </div>
                    </div>

                    <div class="col">
                        <h3><i class="fa-solid fa-user-shield"></i> Thông tin khách hàng</h3>
                        <div class="input-group">
                            <label>Họ và tên</label>
                            <input type="text" id="dr-cust-fullname" placeholder="Nhập tên người đặt" required>
                        </div>
                        <div class="input-group">
                            <label>Số điện thoại (Zalo)</label>
                            <input type="tel" id="dr-cust-phone" placeholder="Để chúng tôi liên lạc" required>
                        </div>
                        <div class="input-group">
                            <label>Số CCCD/Passport</label>
                            <input type="text" id="dr-cust-cccd" placeholder="Số định danh hợp đồng" required>
                        </div>
                    </div>
                </div>

                <div class="price-panel">
                    <p style="color: var(--text-muted); margin: 0; font-weight: 500;">
                        Thanh toán tạm tính cho <mark id="dr-days-text" style="background:none; color:var(--primary-light); font-weight:700;">1</mark> ngày
                    </p>
                    <h2 id="dr-total">500.000 VNĐ</h2>
                    
                    <div style="margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 10px;">
                        <input type="checkbox" id="agree-contract-driver" required style="width: 18px; height: 18px; cursor: pointer;">
                        <label for="agree-contract-driver" style="cursor: pointer; color: var(--text-muted); font-size: 0.85rem;">
                            Tôi xác nhận các thông tin trên là chính xác
                        </label>
                    </div>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn-main btn-primary">
                        <i class="fa-solid fa-qrcode"></i> THANH TOÁN NGAY
                    </button>
                    <button type="button" class="btn-main btn-secondary" onclick="app.printDriverContract()">
                        <i class="fa-solid fa-file-contract"></i> XEM HỢP ĐỒNG
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="payment-modal" class="hidden">
        <div class="modal-box">
            <h3 style="color: var(--primary-light); margin-bottom: 5px;">MÃ THANH TOÁN QR</h3>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 20px;">Vui lòng chuyển khoản đúng số tiền để kích hoạt lịch trình</p>
            
            <div style="background: white; padding: 12px; border-radius: 20px; margin-bottom: 20px; border: 4px solid var(--primary);">
                <img id="qr-code" src="" alt="VietQR" style="width: 100%; height: auto; display: block; border-radius: 10px;">
            </div>

            <div style="margin-bottom: 25px; padding: 15px; background: rgba(0,123,255,0.1); border-radius: 16px; border: 1px dashed var(--primary);">
                <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px;">Số tiền:</p>
                <span id="payment-final-amount" style="color: var(--primary-light); font-weight: 800; font-size: 1.8rem;">0đ</span>
            </div>

            <button id="btn-confirm-payment" class="btn-main btn-primary" style="width: 100%;" onclick="confirmFinal()">
                XÁC NHẬN ĐÃ CHUYỂN KHOẢN
            </button>
            <button onclick="app.closePay()" style="background: none; border: none; color: var(--text-muted); margin-top: 20px; cursor: pointer; text-decoration: underline; font-size: 0.85rem;">
                Hủy giao dịch & Sửa thông tin
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/vn.js"></script>
    <script src="app.js"></script> 
    
    <script>
        // Hàm kiểm tra trước khi đặt
        function handlePreBooking() {
            const phone = document.getElementById('dr-cust-phone').value;
            if(phone.length < 10) {
                Swal.fire('Lỗi', 'Số điện thoại không hợp lệ!', 'error');
                return;
            }
            // Gọi hàm xử lý từ app.js
            app.handleDriverBooking();
        }

        // Hàm xác nhận cuối cùng
        function confirmFinal() {
            Swal.fire({
                title: 'Đang gửi yêu cầu...',
                html: 'Vui lòng chờ trong giây lát',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });
            
            // Giả lập gửi dữ liệu
            setTimeout(() => {
                Swal.fire('Thành công!', 'Yêu cầu của bạn đã được tiếp nhận. Tài xế sẽ sớm liên hệ!', 'success')
                .then(() => { window.location.href = 'index.html'; });
            }, 2000);
        }

        document.addEventListener('DOMContentLoaded', async function() {
            if (window.app) {
                await app.init();
                
                const urlParams = new URLSearchParams(window.location.search);
                const driverId = urlParams.get('id');
                if (driverId) {
                    const foundDriver = app.state.drivers.find(d => d.id == driverId);
                    if (foundDriver) {
                        app.state.selectedDriver = foundDriver;
                        app.updateDriverTotal();
                    }
                }
            }

            const config = {
                minDate: "today",
                dateFormat: "d/m/Y",
                locale: "vn",
                onChange: () => { if(window.app) app.calculateDriverDays(); }
            };
            
            flatpickr("#dr-start-date", config);
            flatpickr("#dr-end-date", config);
        });
    </script>
</body>
</html>
