<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thuê Tài Xế Riêng | TrangHy Autocar</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #007bff;
            --primary-light: #00d1ff;
            --primary-gradient: linear-gradient(135deg, #007bff, #00d1ff);
            --dark-bg: #0b0c10;
            --card-bg: #161b22;
            --input-bg: #1f242d;
            --text-main: #ffffff;
            --text-muted: #8b949e;
            --border: #30363d;
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% -20%, #1c2d4d, var(--dark-bg));
            color: var(--text-main);
            margin: 0; padding: 20px;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Back Button - Glass Effect */
        .back-btn {
            position: fixed; top: 25px; left: 25px; z-index: 100;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            color: white; padding: 12px 24px;
            border-radius: 16px; text-decoration: none;
            font-weight: 600; font-size: 0.9rem;
            display: flex; align-items: center; gap: 10px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .back-btn:hover { 
            background: var(--primary); 
            transform: translateX(-5px);
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.4);
        }

        .container {
            max-width: 1000px; width: 100%; margin-top: 80px;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-section {
            text-align: center; margin-bottom: 50px;
        }
        .header-section h1 { 
            font-size: 2.8rem; font-weight: 800; margin-bottom: 12px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-section p { color: var(--text-muted); font-size: 1.1rem; }

        .booking-card {
            background: var(--card-bg);
            border-radius: 32px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow);
            position: relative;
        }

        .booking-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: var(--primary-gradient);
        }

        .form-content { padding: 50px; }

        .grid-layout {
            display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
        }

        h3 { 
            color: var(--primary-light); font-size: 1.2rem; font-weight: 700;
            margin-bottom: 25px; display: flex; align-items: center; gap: 12px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .input-group { margin-bottom: 25px; }
        label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 10px; font-weight: 500; }
        
        input[type="text"], input[type="tel"], select {
            width: 100%; padding: 16px; background: var(--input-bg);
            border: 1px solid var(--border); border-radius: 16px; color: white;
            box-sizing: border-box; transition: all 0.3s ease;
            font-family: inherit; font-size: 1rem;
        }
        input:focus, select:focus { 
            border-color: var(--primary); outline: none; 
            box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.15);
            background: #252a33;
        }

        /* Price Panel - Modernized */
        .price-panel {
            background: linear-gradient(to right, rgba(0, 123, 255, 0.05), rgba(0, 209, 255, 0.05));
            border: 1px solid rgba(0, 123, 255, 0.2);
            padding: 30px; border-radius: 24px; margin-top: 40px; text-align: center;
            position: relative; overflow: hidden;
        }
        .price-panel p { position: relative; z-index: 1; }
        .price-panel h2 { 
            font-size: 3rem; color: var(--primary-light); margin: 15px 0; 
            font-weight: 800; letter-spacing: -1px;
            transition: opacity 0.3s ease;
        }

        /* Button Group */
        .btn-group {
            display: grid; grid-template-columns: 1.8fr 1fr; gap: 20px; margin-top: 40px;
        }

        .btn-main {
            padding: 20px; border: none; border-radius: 18px; font-weight: 700;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.05rem; display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .btn-primary { 
            background: var(--primary-gradient); color: white;
            box-shadow: 0 10px 20px rgba(0, 123, 255, 0.3);
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 123, 255, 0.4); }
        .btn-primary:active { transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .btn-secondary { 
            background: #21262d; color: white; border: 1px solid var(--border); 
        }
        .btn-secondary:hover { background: #30363d; border-color: var(--text-muted); }

        /* Icon Animation */
        .fa-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        @media (max-width: 850px) {
            .grid-layout { grid-template-columns: 1fr; gap: 20px; }
            .btn-group { grid-template-columns: 1fr; }
            .form-content { padding: 30px; }
            .header-section h1 { font-size: 2rem; }
            .price-panel h2 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">
        <i class="fa-solid fa-chevron-left"></i> Quay lại trang chủ
    </a>

    <div class="container">
        <div class="header-section">
            <h1>Đặt Tài Xế Riêng</h1>
            <p>TrangHy Autocar - Đồng hành cùng bạn trên mọi nẻo đường</p>
        </div>

        <div class="booking-card">
            <form id="driver-booking-form" class="form-content" onsubmit="BookingDriver.handleBooking(event)">
                <div class="grid-layout">
                    <div class="col">
                        <h3><i class="fa-solid fa-calendar-check"></i> Lịch trình</h3>
                        <div class="input-group">
                            <label>Ngày bắt đầu phục vụ</label>
                            <input type="text" id="dr-start-date" placeholder="Chọn ngày đi" required>
                        </div>
                        <div class="input-group">
                            <label>Ngày kết thúc</label>
                            <input type="text" id="dr-end-date" placeholder="Chọn ngày về" required>
                        </div>
                        <div class="input-group">
                            <label>Phân hạng tài xế</label>
                            <select id="driver-pref">
                                <option value="Tài xế phổ thông">Tài xế phổ thông (Nhiệt tình)</option>
                                <option value="Tài xế VIP (>10 năm)">Tài xế VIP (>10 năm kinh nghiệm)</option>
                                <option value="Tài xế tiếng Anh">Tài xế giao tiếp tiếng Anh</option>
                            </select>
                        </div>
                    </div>

                    <div class="col">
                        <h3><i class="fa-solid fa-id-card"></i> Thông tin khách hàng</h3>
                        <div class="input-group">
                            <label>Họ và tên chủ hợp đồng</label>
                            <input type="text" id="cust-name" placeholder="Nhập họ tên của bạn" required>
                        </div>
                        <div class="input-group">
                            <label>Số điện thoại liên lạc</label>
                            <input type="tel" id="cust-phone" placeholder="Số điện thoại dùng Zalo" required>
                        </div>
                        <div class="input-group">
                            <label>Số CCCD/Passport</label>
                            <input type="text" id="cust-cccd" placeholder="Dùng để đối chiếu hợp đồng" required>
                        </div>
                    </div>
                </div>

                <div class="price-panel">
                    <p style="color: var(--text-muted); margin: 0; font-weight: 500;">
                        Tổng chi phí tạm tính (<span id="dr-days-text">1</span> ngày)
                    </p>
                    <h2 id="dr-total">500.000 VNĐ</h2>
                    <p style="font-size: 0.85rem; color: #d32f2f; font-weight: 600;">
                        <i class="fa-solid fa-circle-info"></i> Giá đã bao gồm lương tài xế và bảo hiểm.
                    </p>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn-main btn-primary">
                        <i class="fa-solid fa-paper-plane"></i> XÁC NHẬN ĐẶT TÀI XẾ
                    </button>
                    <button type="button" class="btn-main btn-secondary" onclick="BookingDriver.printDriverContract()">
                        <i class="fa-solid fa-file-invoice"></i> IN HỢP ĐỒNG
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/vn.js"></script>
    <script src="booking-driver.js"></script>
    
    <script>
        // Cấu hình lịch Flatpickr đồng bộ với UI mới
        document.addEventListener('DOMContentLoaded', function() {
            const fpConfig = {
                minDate: "today",
                dateFormat: "d/m/Y",
                locale: "vn",
                allowInput: true,
                onChange: function() {
                    if (typeof BookingDriver !== 'undefined') {
                        BookingDriver.calculateDriverDays();
                    }
                }
            };

            flatpickr("#dr-start-date", fpConfig);
            flatpickr("#dr-end-date", fpConfig);
        });
    </script>
</body>
</html>
